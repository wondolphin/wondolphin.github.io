<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Duplex Sort</title>
  <style>
    /* 宇宙の雰囲気を醸し出す星空背景と全体スタイル */
    * {
      box-sizing: border-box;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: #020208;
      background-image: radial-gradient(circle at center, #08071a 0%, #020208 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      width: 100vw;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      user-select: none;
      -webkit-user-select: none;
    }

    /* 背景の星ドット */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-image: 
        radial-gradient(rgba(255, 255, 255, 0.4) 1px, transparent 1px),
        radial-gradient(rgba(255, 255, 255, 0.3) 1px, transparent 1px);
      background-size: 80px 80px, 130px 130px;
      background-position: 0 0, 40px 60px;
      opacity: 0.5;
      z-index: -1;
    }

    /* 【パラメータ調整①】正方形のラッパー
      paddingの最初の値(%)を大きくすると中身が全体的に下へ移動します。
    */
    .wrapper {
      width: 90vmin;
      height: 90vmin;
      background: rgba(10, 10, 25, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8), inset 0 0 30px rgba(255, 255, 255, 0.02);
      backdrop-filter: blur(8px);
      display: flex;
      flex-direction: column;
      justify-content: space-around; /* 要素を上下に均等かつ広がりを持たせて自動配置 */
      align-items: center;
      padding: 12% 3% 2% 3%; /* 指定の余白に変更（全体的に下に配置されます） */
      position: relative;
    }

    /* 9列を等比率で並べる共通コンテナ */
    .row-container {
      width: 100%;
      display: flex;
      justify-content: center;
    }

    .grid-9 {
      display: grid;
      grid-template-columns: repeat(9, 1fr);
      gap: 2.5%;
      width: 100%;
    }

    /* 【パラメータ調整②】各行ごとの垂直余白 (margin) */
    #center-grid-container {
      margin-bottom: 2%; /* 中央正方形からランプへの距離 */
    }

    #lamps-grid-container {
      margin-top: 1%;
      margin-bottom: 1%;
      z-index: 5;
    }

    #bottom-grid-container {
      margin-top: 2%;    /* ランプから下ボタンへの距離 */
      margin-bottom: 4%; /* 下ボタンからリセットボタンへの距離 */
    }

    /* 共通セル */
    .cell {
      aspect-ratio: 1 / 1;
      transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
      position: relative;
    }

    /* 【パラメータ調整③】中央に配置されたランプの大きさ (scale) */
    .lamp {
      border-radius: 50%;
      transform: scale(0.45); /* ランプの大きさ */
      background-color: rgba(255, 255, 255, 0.08); /* デフォルト消灯色 */
      border: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.8);
    }

    .lamp.off {
      opacity: 0.3;
      box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.8);
    }

    .lamp.on {
      opacity: 1;
      box-shadow: 0 0 18px currentColor, inset 0 -2px 4px rgba(255, 255, 255, 0.4);
    }

    /* クリア時：おめでたく波打つレインボー演出アニメーション */
    @keyframes party-lamp {
      0% {
        transform: scale(0.45);
        filter: hue-rotate(0deg) brightness(1.3);
      }
      50% {
        transform: scale(0.75);
        filter: hue-rotate(180deg) brightness(2.0);
        box-shadow: 0 0 25px currentColor, inset 0 -3px 6px rgba(255, 255, 255, 0.8);
      }
      100% {
        transform: scale(0.45);
        filter: hue-rotate(360deg) brightness(1.3);
      }
    }

    .lamp.party {
      animation: party-lamp 1.2s ease-in-out infinite;
    }

    /* 中央正方形 */
    .center-cell {
      border-radius: 12%;
    }

    /* 上のターゲット：アクティブな選択先を示す目立つ枠（ネオンゴールド） */
    .center-cell.active {
      outline: 3px solid #FFE600;
      outline-offset: 3px;
      box-shadow: 0 0 15px #FFE600, inset 0 0 6px rgba(255, 255, 255, 0.8);
      transform: scale(1.08);
      z-index: 10;
    }

    /* 下方正方形（タップできるボタン） */
    .bottom-cell {
      border-radius: 12%;
      cursor: pointer;
      /* 押せる感じを出すため、上のターゲットと同構造の枠を追加（色は半透明ホワイト） */
      outline: 2px solid rgba(255, 255, 255, 0.35);
      outline-offset: 3px;
    }

    .bottom-cell:hover {
      transform: scale(1.08) translateY(-2px);
      filter: brightness(1.1);
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.5);
      outline-color: rgba(255, 255, 255, 0.75);
    }

    .bottom-cell:active {
      transform: scale(0.95);
      outline-color: rgba(255, 255, 255, 0.95);
    }

    /* リセットボタン */
    .reset-container {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
    }

    .reset-btn {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 50%;
      width: 11%;
      aspect-ratio: 1 / 1;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      color: rgba(255, 255, 255, 0.4);
      transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
      padding: 0;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
    }

    .reset-btn:hover {
      color: #ffffff;
      border-color: rgba(255, 255, 255, 0.6);
      background: rgba(255, 255, 255, 0.08);
      transform: rotate(45deg) scale(1.05);
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.15);
    }

    .reset-btn:active {
      transform: rotate(180deg) scale(0.9);
    }

    .reset-btn svg {
      width: 50%;
      height: 50%;
      fill: currentColor;
    }

    /* クリア時オーバーレイ（うっすら背面が透けて見える暗さ） */
    .clear-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(3, 3, 12, 0.65); /* 暗すぎず、背後の七色お祝いウェーブが透けて見える */
      border-radius: 24px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.6s cubic-bezier(0.25, 1, 0.5, 1);
      z-index: 100;
      backdrop-filter: blur(4px); /* 背景を軽くぼかして文字を見やすく */
    }

    .clear-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    .clear-text {
      font-size: 8.5vmin;
      font-weight: 900;
      color: #ffffff;
      letter-spacing: 0.15em;
      text-shadow: 
        0 0 10px rgba(255, 255, 255, 0.95), 
        0 0 20px rgba(59, 130, 246, 0.8), 
        0 0 40px rgba(147, 51, 234, 0.6);
      animation: pulse 2.5s infinite;
      text-align: center;
      margin-bottom: 1.5rem;
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
        text-shadow: 
          0 0 10px rgba(255, 255, 255, 0.95), 
          0 0 20px rgba(59, 130, 246, 0.8), 
          0 0 40px rgba(147, 51, 234, 0.6);
      }
      50% {
        transform: scale(1.06);
        text-shadow: 
          0 0 15px rgba(255, 255, 255, 1), 
          0 0 30px rgba(59, 130, 246, 0.9), 
          0 0 50px rgba(147, 51, 234, 0.8);
      }
    }

    /* シェアボタン関連のスタイル（最新の共通設計を反映） */
    #share-container {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      align-items: center;
      width: 100%;
      max-width: 320px;
    }
    .share-btn, .choice-btn, .copy-btn, .back-btn {
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 0.8rem 1.5rem;
      border-radius: 2rem;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: bold;
      transition: all 0.3s ease;
      cursor: pointer;
      min-width: 260px;
      text-align: center;
      outline: none;
    }
    .share-btn {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .share-btn svg {
      width: 1.1rem;
      height: 1.1rem;
      fill: currentColor;
      margin-right: 0.5rem;
    }
    .share-btn:hover, .choice-btn:hover, .copy-btn:hover {
      background: #00E5FF; /* パズルのネオンシアンに合わせる */
      color: #020208;
      border-color: #00E5FF;
      transform: scale(1.02);
      box-shadow: 0 0 15px rgba(0, 229, 255, 0.6);
    }
    .back-btn:hover {
      background: rgba(255, 255, 255, 0.15);
      border-color: rgba(255, 255, 255, 0.5);
    }
    .back-btn {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.5);
      font-size: 0.8rem;
      padding: 0.5rem 2rem;
      min-width: 150px;
    }

    /* 選択肢ボタンのコンテナ（ピュアCSSで隙間を確実に空ける） */
    .choices-wrapper {
      display: flex;
      flex-direction: column;
      gap: 0.8rem; /* ボタン同士に隙間を空ける */
      align-items: center;
      width: 100%;
    }

    .help-link {
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.4);
      text-decoration: underline;
      cursor: pointer;
      margin-top: 0.5rem;
    }
    .help-link:hover {
      color: rgba(255, 255, 255, 0.8);
    }

    .manual-copy-section {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 1rem;
      border-radius: 1rem;
      width: 90%;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      align-items: center;
    }
    .manual-instruction {
      font-size: 0.75rem;
      font-weight: 300;
      color: rgba(255, 255, 255, 0.7);
    }
    .manual-text-area {
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 0.8rem;
      border-radius: 0.5rem;
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.7);
      white-space: pre-wrap;
      word-break: break-all;
      text-align: left;
      width: 100%;
      font-family: monospace;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div class="wrapper">
    <!-- 1行目：中央の正方形行 (9色) -->
    <div class="row-container" id="center-grid-container">
      <div class="grid-9" id="center-grid"></div>
    </div>

    <!-- 2行目：ランプ行（2つの正方形の間、かなり小さめの円） -->
    <div class="row-container" id="lamps-grid-container">
      <div class="grid-9" id="lamps-grid"></div>
    </div>

    <!-- 3行目：下の正方形行 (9色) -->
    <div class="row-container" id="bottom-grid-container">
      <div class="grid-9" id="bottom-grid"></div>
    </div>

    <!-- リセットボタン -->
    <div class="reset-container">
      <button id="reset-btn" class="reset-btn" aria-label="Reset">
        <svg viewBox="0 0 24 24">
          <path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/>
        </svg>
      </button>
    </div>

    <!-- クリア時演出用オーバーレイ -->
    <div class="clear-overlay" id="clear-overlay">
      <div class="clear-text">CLEAR!</div>
      <div id="share-container">
        <!-- JSで動的に生成 -->
      </div>
    </div>
  </div>

  <script {nonce}>
    // カラー設定 (色のID 0〜8)
    const colorPalette = {
      0: '#9E1A1A', // 赤 (渋い深紅)
      1: '#3B82F6', // 青
      2: '#0B7A3E', // 緑 (濃い)
      3: '#FFD54F', // 黄 (ゴールドイエロー)
      4: '#8B5CF6', // 紫
      5: '#F97316', // オレンジ
      6: '#EC4899', // ピンク
      7: '#00E5FF', // 水色 (明るく鮮明に)
      8: '#A3E635'  // 黄緑 (明るいライム)
    };

    // 初期状態の各配列 (ご指定 of 初期配置)
    const initialA = [4, 1, 2, 8, 4, 2, 3, 1, 7];
    const initialB = [5, 0, 6, 5, 7, 8, 6, 0, 3];

    // シェア用設定
    const SHARE_CONFIG = {
      TWEET_TEXT: "ルールを推測するパズル「Duplex Sort」をクリアしました！\n#宇宙謎 #ルール発見型パズル @wondolphin",
      TWEET_TEXT2: "ルールを推測するパズル「Duplex Sort」をクリアしました！\n#ルール発見型パズル #宇宙謎 @wondolphin",
      TWEET_URL: "https://wondolphin.github.io/puzzle/uchunazo/duplex_sort/index.html",
      SUPPORT_URL: "https://twitter.com/wondolphin/status/2068635532998152193"
    };

    // ゲーム内状態変数
    let A = [...initialA];
    let B = [...initialB];
    let activeFrame = 0;
    let isCleared = false;
    let moveCount = 0; // ボタン操作回数のカウンタを追加

    // DOM要素の生成と初期化
    window.onload = function() {
      const lampsGrid = document.getElementById('lamps-grid');
      const centerGrid = document.getElementById('center-grid');
      const bottomGrid = document.getElementById('bottom-grid');
      const resetBtn = document.getElementById('reset-btn');
      const overlay = document.getElementById('clear-overlay');

      // 9つの要素をそれぞれグリッドに生成
      for (let i = 0; i < 9; i++) {
        // 中間ランプの生成
        const lamp = document.createElement('div');
        lamp.id = `lamp-${i}`;
        lamp.className = 'cell lamp off';
        lampsGrid.appendChild(lamp);

        // 中央正方形の生成
        const centerCell = document.createElement('div');
        centerCell.id = `center-${i}`;
        centerCell.className = 'cell center-cell';
        centerGrid.appendChild(centerCell);

        // 下方正方形（ボタン）の生成
        const bottomCell = document.createElement('div');
        bottomCell.id = `bottom-${i}`;
        bottomCell.className = 'cell bottom-cell';
        bottomCell.addEventListener('click', () => handleBottomClick(i));
        bottomGrid.appendChild(bottomCell);
      }

      // リセットイベント
      resetBtn.addEventListener('click', resetGame);

      // クリアオーバーレイをクリックしたら消す（ただし、シェアUI内部がクリックされた場合は除外する）
      overlay.addEventListener('click', (event) => {
        const shareContainer = document.getElementById('share-container');
        if (shareContainer.contains(event.target)) {
          return;
        }
        hideClear();
      });

      // 初期UIを更新
      updateUI();
    };

    // UIを最新の状態に更新
    function updateUI() {
      // 1. ランプの状態更新
      for (let i = 0; i < 9; i++) {
        const lampEl = document.getElementById(`lamp-${i}`);
        
        // クリア演出中は通常の更新処理をスキップ
        if (isCleared) continue;

        const isOn = (A[i] === B[i]);
        if (isOn) {
          lampEl.classList.remove('off');
          lampEl.classList.add('on');
          // 揃った色その目でランプを鮮やかに発光させる
          const matchedColor = colorPalette[A[i]];
          lampEl.style.backgroundColor = matchedColor;
          lampEl.style.color = matchedColor; // ネオンの影色に反映
        } else {
          lampEl.classList.remove('on');
          lampEl.classList.add('off');
          // 消灯時は薄暗い闇色に戻す
          lampEl.style.backgroundColor = 'rgba(255, 255, 255, 0.08)';
          lampEl.style.color = 'transparent';
        }
      }

      // 2. 中央正方形の状態更新
      for (let i = 0; i < 9; i++) {
        const cellEl = document.getElementById(`center-${i}`);
        cellEl.style.backgroundColor = colorPalette[A[i]];
        
        // CLEAR判定されている場合は active（黄色枠）クラスを付与しない
        if (i === activeFrame && !isCleared) {
          cellEl.classList.add('active');
        } else {
          cellEl.classList.remove('active');
        }
      }

      // 3. 下方正方形の状態更新
      for (let j = 0; j < 9; j++) {
        const cellEl = document.getElementById(`bottom-${j}`);
        cellEl.style.backgroundColor = colorPalette[B[j]];
      }
    }

    // 下方の要素をクリックした時の処理
    function handleBottomClick(j) {
      if (isCleared) return;

      // 現在枠がある中央の要素とタップした下方の要素の色を交換
      const i = activeFrame;
      const temp = A[i];
      A[i] = B[j];
      B[j] = temp;

      // 枠は一つ右に移動する。右端に達した場合は一番左に戻る
      activeFrame = (activeFrame + 1) % 9;

      // 操作回数を1加算
      moveCount++;

      // 画面更新とクリア判定
      updateUI();
      checkClear();
    }

    // クリア判定
    function checkClear() {
      // すべての列で上下の色が同じ (A[i] === B[i]) かどうかチェック
      const allOn = A.every((color, i) => A[i] === B[i]);
      
      if (allOn) {
        playClearAnimation();
      }
    }

    // めでたいクリア演出の実行
    function playClearAnimation() {
      isCleared = true;

      // 即座に中央の正方形を更新してターゲットの枠（active）を消去する
      updateUI();

      // 全てのランプにウェーブディレイを設定してパーティー演出アニメーションを起動
      for (let i = 0; i < 9; i++) {
        const lampEl = document.getElementById(`lamp-${i}`);
        
        // 元々の点灯色をベースに設定
        const matchedColor = colorPalette[A[i]];
        lampEl.style.backgroundColor = matchedColor;
        lampEl.style.color = matchedColor;
        
        // アニメーションクラスを付与し、順々にうねる遅延時間をずらす
        lampEl.classList.remove('off', 'on');
        lampEl.classList.add('party');
        lampEl.style.animationDelay = `${i * 0.12}s`;
      }

      // 2.2秒間のめでたいウェーブを挟んだ後に、CLEARを表示
      setTimeout(() => {
        showClear();
      }, 2200);
    }

    // クリアオーバーレイ表示
    function showClear() {
      setupShareUI();
      const overlay = document.getElementById('clear-overlay');
      overlay.classList.add('show');
    }

    // クリアオーバーレイ非表示
    function hideClear() {
      const overlay = document.getElementById('clear-overlay');
      overlay.classList.remove('show');
    }

    // 多機能シェアUIの動的構築
    function setupShareUI() {
      const shareContainer = document.getElementById('share-container');
      shareContainer.innerHTML = '';
      
      // 動的にシェアテキストを判定 (moveCountがちょうど9回なら「【一撃で】」に差し替え)
      let tweetText = SHARE_CONFIG.TWEET_TEXT;
      if (moveCount === 9) {
        tweetText = tweetText.replace(
          "「Duplex Sort」をクリアしました！", 
          "「Duplex Sort」を【一撃で】クリアしました！"
        );
       }
        let tweetText2 = SHARE_CONFIG.TWEET_TEXT2;
      if (moveCount === 9) {
        tweetText2 = tweetText2.replace(
          "「Duplex Sort」をクリアしました！", 
          "「Duplex Sort」を【一撃で】クリアしました！"
        );
      }
      
      // 手動コピー用のテキスト
      const manualText = tweetText2 + "\n" + SHARE_CONFIG.TWEET_URL;

      const mainBtn = document.createElement('button');
      mainBtn.className = 'share-btn';
      mainBtn.innerHTML = `
        <svg viewBox="0 0 24 24">
          <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
        </svg>
        喜びをXでシェアする
      `;
      
      const choicesDiv = document.createElement('div');
      choicesDiv.className = 'hidden choices-wrapper';
      
      const reportBtn = document.createElement('button');
      reportBtn.className = 'choice-btn';
      reportBtn.innerText = 'クリア報告のポスト';
      
      const supportBtn = document.createElement('button');
      supportBtn.className = 'choice-btn';
      supportBtn.innerText = '原ポストにいいね・リポスト';

      const helpLink = document.createElement('div');
      helpLink.className = 'help-link';
      helpLink.innerText = 'シェアがうまくいかない場合';

      // 手動コピーセクション
      const manualCopySection = document.createElement('div');
      manualCopySection.className = 'manual-copy-section hidden';
      
      const manualInstruction = document.createElement('div');
      manualInstruction.className = 'manual-instruction';
      manualInstruction.innerText = 'こちらをコピーしてご投稿ください↓';

      const manualTextArea = document.createElement('div');
      manualTextArea.className = 'manual-text-area';
      manualTextArea.innerText = manualText;

      const copyBtn = document.createElement('button');
      copyBtn.className = 'copy-btn';
      copyBtn.innerText = 'テキストをコピーする';
      
      const backBtn = document.createElement('button');
      backBtn.className = 'back-btn';
      backBtn.innerText = '戻る';
      
      // 各種ボタンのイベント設定（x.comを使い、インテントの不具合を防止）
      reportBtn.onclick = (e) => {
        e.stopPropagation();
        const text = encodeURIComponent(tweetText); // 動的に判定したテキストをエンコード
        const url = encodeURIComponent(SHARE_CONFIG.TWEET_URL);
        window.open(`https://x.com/intent/tweet?text=${text}&url=${url}`, '_blank', 'noopener,noreferrer');
      };

      supportBtn.onclick = (e) => {
        e.stopPropagation();
        window.open(SHARE_CONFIG.SUPPORT_URL, '_blank', 'noopener,noreferrer');
      };
      
      mainBtn.onclick = (e) => {
        e.stopPropagation();
        mainBtn.classList.add('hidden');
        choicesDiv.classList.remove('hidden');
      };

      // 手動コピー画面へ
      helpLink.onclick = (e) => {
        e.stopPropagation();
        choicesDiv.classList.add('hidden');
        manualCopySection.classList.remove('hidden');
      };

      // 選択肢に戻る
      backBtn.onclick = (e) => {
        e.stopPropagation();
        manualCopySection.classList.add('hidden');
        choicesDiv.classList.remove('hidden');
      };

      // コピー処理
      copyBtn.onclick = (e) => {
        e.stopPropagation();
        const el = document.createElement('textarea');
        el.value = manualText;
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);
        
        const originalText = copyBtn.innerText;
        copyBtn.innerText = 'コピーしました！';
        setTimeout(() => {
          copyBtn.innerText = originalText;
        }, 2000);
      };

      choicesDiv.appendChild(reportBtn);
      choicesDiv.appendChild(supportBtn);
      choicesDiv.appendChild(helpLink);
      
      manualCopySection.appendChild(manualInstruction);
      manualCopySection.appendChild(manualTextArea);
      manualCopySection.appendChild(copyBtn);
      manualCopySection.appendChild(backBtn);

      shareContainer.appendChild(mainBtn);
      shareContainer.appendChild(choicesDiv);
      shareContainer.appendChild(manualCopySection);
    }

    // ゲームのリセット
    function resetGame() {
      A = [...initialA];
      B = [...initialB];
      activeFrame = 0;
      isCleared = false;
      moveCount = 0; // リセット時にもボタン操作回数を0にクリアする
      
      // ランプのアニメーション状態とディレイ設定をクリア
      for (let i = 0; i < 9; i++) {
        const lampEl = document.getElementById(`lamp-${i}`);
        lampEl.classList.remove('party');
        lampEl.style.animationDelay = '';
      }

      hideClear();
      updateUI();
    }
  </script>
</body>
</html>
