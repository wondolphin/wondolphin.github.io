<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>月は導く</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');

        body {
            background: radial-gradient(circle at center, #2e1065 0%, #1e1b4b 100%);
            color: #f1f5f9;
            font-family: 'Noto Sans JP', sans-serif;
            overflow: hidden;
            user-select: none;
            height: 100vh;
            height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 0;
        }

        .game-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 1.5vh 1rem;
            box-sizing: border-box;
            gap: 2vh;
        }

        .title-text {
            font-weight: 900;
            letter-spacing: 0.1em;
            text-shadow: 0 0 30px rgba(251, 191, 36, 0.3);
            line-height: 1.2;
            font-size: clamp(2rem, 7vh, 3.5rem);
            color: #ffffff;
            margin: 0;
        }

        /* メーターエリア: ランプを極限まで近づける */
        .meter-area {
            display: flex;
            align-items: center;
            gap: 4px; /* 隙間をほとんどなくす */
            width: min(90vw, 55vh);
        }

        .meter-container {
            flex: 1;
            height: 16px;
            display: flex;
            gap: 2px;
            background-color: rgba(0, 0, 0, 0.3);
            padding: 2px;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .meter-segment {
            flex: 1;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.05);
            transition: background-color 0.3s ease, box-shadow 0.3s ease;
        }

        .meter-segment.active {
            background-color: #4ade80;
            box-shadow: 0 0 8px rgba(74, 222, 128, 0.6);
        }

        /* 共通ランプベースサイズ */
        .lamp-base {
            background: #1e1b4b;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            width: 9vmin;
            height: 9vmin;
            max-width: 44px;
            max-height: 44px;
            flex-shrink: 0;
        }

        .lamp-core {
            border-radius: 50%;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            width: 50%;
            height: 50%;
            background-color: #334155;
        }

        .meter-lamp-core.active {
            background-color: #4ade80;
            box-shadow: 0 0 20px #4ade80;
            transform: scale(1.1);
        }

        /* ステージエリア */
        .stage-area {
            position: relative;
            width: min(90vw, 60vh);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .lamp-dock {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 1.5%;
            padding: 0 3%;
            height: 44px;
            margin-bottom: -22px;
            position: relative;
            z-index: 30;
            width: 100%;
        }

        .lamp-spot {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .source-triangle {
            width: 0;
            height: 0;
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-top: 20px solid #4ade80;
            filter: drop-shadow(0 0 10px #4ade80);
            animation: pulse-source 2.5s infinite ease-in-out;
        }

        @keyframes pulse-source {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 10px #4ade80); }
            50% { transform: scale(1.2); filter: drop-shadow(0 0 20px #4ade80); }
        }

        .target-base {
            border: 2px dashed #4ade80;
        }

        .target-core.active {
            background-color: #4ade80;
            box-shadow: 0 0 30px 10px #4ade80;
            transform: scale(1.15);
        }

        /* 盤面コンテナ: content.html参照の色味 */
        .board-container {
            background: rgba(30, 27, 75, 0.6);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.6);
            position: relative;
            z-index: 10;
            backdrop-filter: blur(10px);
            width: 100%;
            aspect-ratio: 1 / 1;
        }

        .tile-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            grid-template-rows: repeat(6, 1fr);
            gap: 1.5%;
            padding: 3%;
            width: 100%;
            height: 100%;
            border-radius: 20px;
            position: relative;
        }

        .tile {
            aspect-ratio: 1 / 1;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 15%;
            z-index: 5;
            overflow: hidden;
        }

        /* content.htmlの色味を反映 */
        .tile-empty {
            background-color: rgba(5, 5, 5, 0.13);
            border: 1px solid rgba(5, 5, 5, 0.05);
        }

        .tile-panel {
            background: rgba(255, 255, 255, 0.03);
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .tile-selected {
            box-shadow: 0 0 0 4px #fbbf24;
            background: rgba(251, 191, 36, 0.15);
            transform: scale(1.05);
            z-index: 20;
        }

        .tile-fixed {
            background: rgba(5, 5, 5, 0.13);
            border: 1px solid rgba(5, 5, 5, 0.05);
            cursor: not-allowed;
        }

        .tile-cleared {
            background-color: rgba(74, 222, 128, 0.4) !important;
            box-shadow: inset 0 0 15px rgba(74, 222, 128, 0.6) !important;
            border-color: #4ade80 !important;
        }

        .panel-image {
            width: 90%;
            height: 90%;
            object-fit: contain;
            filter: drop-shadow(0 0 5px rgba(0,0,0,0.5));
        }

        /* 光のルート */
        .global-path-svg {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 25;
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        .global-path-svg.visible {
            opacity: 1;
        }

        .beam-line {
            stroke: #4ade80;
            stroke-width: 5;
            stroke-linecap: round;
            stroke-linejoin: bevel; /* content.html準拠 */
            fill: none;
            filter: drop-shadow(0 0 12px #22c55e);
        }

        /* クリア画面: 背景の透過率を上げて盤面を見せる */
        #clear-modal {
            background-color: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            cursor: pointer;
            width: 100%;
            height: 100%;
        }

        .modal-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            width: 100%;
            height: 100%;
        }

        /* シェアボタンのコンテナ */
        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            width: 100%;
            max-width: 320px;
        }

        .share-option-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #ffffff;
            padding: 1rem;
            border-radius: 12px;
            font-weight: 700;
            transition: all 0.2s;
        }

        .share-option-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <h1 class="title-text">月は導く</h1>

        <div class="meter-area">
            <div id="meter-container" class="meter-container">
                <!-- JSで36セグメント生成 -->
            </div>
            <div class="lamp-base">
                <div id="meter-lamp-core" class="meter-lamp-core lamp-core"></div>
            </div>
        </div>

        <div class="stage-area">
            <div class="lamp-dock">
                <div class="col-start-2 lamp-spot">
                    <div id="source-lamp">
                        <div class="source-triangle"></div>
                    </div>
                </div>
                <div class="col-start-4 lamp-spot">
                    <div id="target-lamp-container" class="lamp-base target-base">
                        <div id="target-lamp" class="target-core lamp-core"></div>
                    </div>
                </div>
            </div>

            <div class="board-container">
                <div id="board-root" class="relative w-full h-full">
                    <div id="board" class="tile-grid"></div>
                    <svg id="path-overlay" class="global-path-svg">
                        <polyline id="path-line" class="beam-line" points="" />
                    </svg>
                </div>
            </div>
        </div>
    </div>

    <!-- クリア画面 -->
    <div id="clear-modal" class="hidden fixed inset-0 z-50 p-6" onclick="closeModal()">
        <div class="modal-content space-y-12 pointer-events-none">
            <h2 id="clear-title" class="text-6xl sm:text-8xl font-black text-amber-400 animate-bounce tracking-tighter drop-shadow-2xl">CLEAR!</h2>
            
            <div class="btn-container pointer-events-auto">
                <!-- デフォルトのシェアボタン -->
                <button id="share-btn" class="w-full bg-green-500 hover:bg-green-400 text-indigo-950 font-black py-4 px-6 rounded-2xl shadow-2xl transition transform hover:scale-105 active:scale-95">
                    <span id="share-btn-text" class="text-xl whitespace-nowrap font-bold">Xで喜びを共有する</span>
                </button>
                
                <!-- 選択肢メニュー (最初は隠れている) -->
                <div id="share-choices" class="hidden flex flex-col gap-3">
                    <button id="post-report-btn" class="w-full bg-white text-indigo-950 font-black py-4 rounded-xl shadow-lg hover:bg-gray-100 transition">
                        クリア報告のポスト
                    </button>
                    <button id="like-original-btn" class="w-full bg-indigo-600 text-white font-black py-4 rounded-xl shadow-lg hover:bg-indigo-500 transition">
                        原ポストにいいね・リポスト
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        /**
         * シェアモードの設定
         * true: 「喜びを共有する」を押した後に選択肢を表示する
         * false: 「喜びを共有する」を押すと直接ポスト投稿画面を開く
         */
        const SHARE_MODE_CHOICE = false; // ★ここを書き換えて切り替え可能

        // 原ポストのURL (必要に応じて設定)
        const ORIGINAL_POST_URL = "https://x.com/"; 

        const GRID_SIZE = 6;
        const SEGMENTS = 36;
        const boardElement = document.getElementById('board');
        const meterContainer = document.getElementById('meter-container');
        const meterLampCore = document.getElementById('meter-lamp-core');
        const targetLamp = document.getElementById('target-lamp');
        const clearModal = document.getElementById('clear-modal');
        const pathOverlay = document.getElementById('path-overlay');
        const pathLine = document.getElementById('path-line');
        const boardRoot = document.getElementById('board-root');

        let boardState = [];
        let selected = null;
        let isLocked = false;
        let showClearVisuals = false;

        for (let i = 0; i < SEGMENTS; i++) {
            const seg = document.createElement('div');
            seg.className = 'meter-segment';
            meterContainer.appendChild(seg);
        }

        function initGame() {
            for (let r = 0; r < GRID_SIZE; r++) {
                boardState[r] = [];
                for (let c = 0; c < GRID_SIZE; c++) {
                    boardState[r][c] = null;
                }
            }
            boardState[1][0] = { type: 1, fixed: false };
            boardState[1][1] = { type: 1, fixed: false };
            boardState[3][4] = { type: 4, fixed: false };
            boardState[3][5] = { type: 4, fixed: false };
            boardState[1][4] = { type: 3, fixed: false };
            boardState[1][5] = { type: 3, fixed: false };
            boardState[3][0] = { type: 2, fixed: false };
            boardState[3][1] = { type: 2, fixed: false };
            boardState[5][2] = { type: 2, fixed: true };
            boardState[5][3] = { type: 1, fixed: true };
            render();
        }

        function getRotation(type) {
            if (type === 1) return 0;
            if (type === 2) return -90;
            if (type === 3) return 180;
            if (type === 4) return 90;
            return 0;
        }

        function render() {
            boardElement.innerHTML = '';
            const { pathData, reachedTarget, uniqueCount } = calculatePath();
            const isPerfect = (reachedTarget && uniqueCount === 36);
            
            if (!isPerfect) {
                showClearVisuals = false;
                pathOverlay.classList.remove('visible');
            }

            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    const tile = boardState[r][c];
                    const tileDiv = document.createElement('div');
                    const isSelected = selected && selected.r === r && selected.c === c;
                    
                    tileDiv.className = `tile ${tile ? 'tile-panel' : 'tile-empty'} ${tile?.fixed ? 'tile-fixed' : ''} ${isSelected ? 'tile-selected' : ''}`;
                    
                    if (showClearVisuals) {
                        tileDiv.classList.add('tile-cleared');
                    }

                    if (tile) {
                        const img = document.createElement('img');
                        img.src = tile.fixed ? 'panel_locked.png' : 'panel.png';
                        img.className = 'panel-image';
                        img.style.transform = `rotate(${getRotation(tile.type)}deg)`;
                        img.onerror = () => {
                            img.style.display = 'none';
                            tileDiv.innerHTML = `<div class="w-3/4 h-3/4 bg-indigo-500/20 rounded-full border border-indigo-400/20 shadow-inner"></div>`;
                        };
                        tileDiv.appendChild(img);
                    }
                    tileDiv.onclick = () => handleTileClick(r, c);
                    boardElement.appendChild(tileDiv);
                }
            }

            const segments = meterContainer.children;
            for (let i = 0; i < SEGMENTS; i++) {
                if (i < uniqueCount) {
                    segments[i].classList.add('active');
                } else {
                    segments[i].classList.remove('active');
                }
            }

            if (uniqueCount === SEGMENTS) {
                meterLampCore.classList.add('active');
            } else {
                meterLampCore.classList.remove('active');
            }

            if (reachedTarget) {
                targetLamp.classList.add('active');
            } else {
                targetLamp.classList.remove('active');
            }

            if (isPerfect && !showClearVisuals && !isLocked) {
                setTimeout(() => {
                    showClearVisuals = true;
                    drawPath(pathData);
                    const tiles = boardElement.querySelectorAll('.tile');
                    tiles.forEach(t => t.classList.add('tile-cleared'));
                    pathOverlay.classList.add('visible');
                    triggerClearSequence();
                }, 50);
            }
        }

        function drawPath(pathData) {
            const tiles = boardElement.children;
            if (tiles.length === 0) return;
            const rootRect = boardRoot.getBoundingClientRect();
            let points = [];

            const sourceLamp = document.getElementById('source-lamp');
            const sourceRect = sourceLamp.getBoundingClientRect();
            points.push(`${(sourceRect.left + sourceRect.width / 2) - rootRect.left}, ${(sourceRect.top + sourceRect.height / 2) - rootRect.top}`);

            pathData.forEach(step => {
                const tile = tiles[step.r * GRID_SIZE + step.c];
                const tileRect = tile.getBoundingClientRect();
                points.push(`${(tileRect.left + tileRect.width / 2) - rootRect.left}, ${(tileRect.top + tileRect.height / 2) - rootRect.top}`);
            });

            const targetLampBase = document.getElementById('target-lamp-container');
            const targetRect = targetLampBase.getBoundingClientRect();
            points.push(`${(targetRect.left + targetRect.width / 2) - rootRect.left}, ${(targetRect.top + targetRect.height / 2) - rootRect.top}`);

            pathLine.setAttribute('points', points.join(' '));
        }

        function triggerClearSequence() {
            isLocked = true;
            // 状態をリセット
            document.getElementById('share-btn').classList.remove('hidden');
            document.getElementById('share-choices').classList.add('hidden');
            
            setTimeout(() => {
                if (showClearVisuals) clearModal.classList.remove('hidden');
            }, 3000);
        }

        function closeModal() {
            clearModal.classList.add('hidden');
            isLocked = false;
        }

        function handleTileClick(r, c) {
            if (isLocked) return;
            const tile = boardState[r][c];
            if (selected) {
                if (selected.r === r && selected.c === c) {
                    selected = null;
                } else if (!tile || !tile.fixed) {
                    const temp = boardState[r][c];
                    boardState[r][c] = boardState[selected.r][selected.c];
                    boardState[selected.r][selected.c] = temp;
                    selected = null;
                } else {
                    selected = null;
                }
            } else if (tile && !tile.fixed) {
                selected = { r, c };
            }
            render();
        }

        function calculatePath() {
            let pathData = [];
            let currR = 0, currC = 1, dir = 'DOWN', steps = 0;
            while (currR >= 0 && currR < GRID_SIZE && currC >= 0 && currC < GRID_SIZE && steps < 500) {
                let inDir = dir, exitDir = dir;
                const tile = boardState[currR][currC];
                if (tile) {
                    let nextDir = null;
                    if (dir === 'DOWN') { if (tile.type === 1) nextDir = 'RIGHT'; else if (tile.type === 2) nextDir = 'LEFT'; }
                    else if (dir === 'UP') { if (tile.type === 3) nextDir = 'LEFT'; else if (tile.type === 4) nextDir = 'RIGHT'; }
                    else if (dir === 'LEFT') { if (tile.type === 1) nextDir = 'UP'; else if (tile.type === 4) nextDir = 'DOWN'; }
                    else if (dir === 'RIGHT') { if (tile.type === 2) nextDir = 'UP'; else if (tile.type === 3) nextDir = 'DOWN'; }
                    if (nextDir) { exitDir = nextDir; dir = nextDir; } else { pathData.push({ r: currR, c: currC, in: inDir, out: null }); break; }
                }
                pathData.push({ r: currR, c: currC, in: inDir, out: exitDir });
                steps++;
                if (dir === 'DOWN') currR++; else if (dir === 'UP') currR--; else if (dir === 'LEFT') currC--; else if (dir === 'RIGHT') currC++;
            }
            return { pathData, reachedTarget: (currR === -1 && currC === 3 && dir === 'UP'), uniqueCount: new Set(pathData.map(p => `${p.r},${p.c}`)).size };
        }

        // ポスト投稿画面を開く関数
        function openTweetWindow() {
            const text = encodeURIComponent("宇宙謎「月は導く」をクリアしました！\n#宇宙謎　#ルール発見型パズル　@wondolphin\nhttps://wondolphin.github.io/puzzle/uchunazo/moon_conducts/index.html");
            window.open(`https://twitter.com/intent/tweet?text=${text}`, '_blank');
        }

        // シェアボタンのクリックイベント
        document.getElementById('share-btn').onclick = (e) => {
            e.stopPropagation();
            if (SHARE_MODE_CHOICE) {
                // 選択肢メニューを表示
                document.getElementById('share-btn').classList.add('hidden');
                document.getElementById('share-choices').classList.remove('hidden');
            } else {
                // 直接ポスト画面へ
                openTweetWindow();
            }
        };

        // 各選択ボタンのイベント
        document.getElementById('post-report-btn').onclick = (e) => {
            e.stopPropagation();
            openTweetWindow();
        };

        document.getElementById('like-original-btn').onclick = (e) => {
            e.stopPropagation();
            window.open(ORIGINAL_POST_URL, '_blank');
        };

        window.onload = initGame;
        window.addEventListener('resize', () => { 
            if (showClearVisuals) {
                const { pathData } = calculatePath();
                drawPath(pathData); 
            }
        });
    </script>
</body>
</html>
