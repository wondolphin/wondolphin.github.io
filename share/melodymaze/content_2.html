<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melody Maze - 音楽パズル</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-light: #818cf8;
            --accent: #f472b6;
            --bg-grad-start: #0f172a;
            --bg-grad-end: #1e293b;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top left, var(--bg-grad-start), var(--bg-grad-end));
            color: #e2e8f0;
            user-select: none;
        }

        /* グリッドとセルのスタイル */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(6, 64px);
            gap: 12px;
            padding: 16px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .cell {
            width: 64px;
            height: 64px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            position: relative;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            font-size: 1.1rem;
            color: #94a3b8;
        }

        /* セルの状態別スタイル */
        .cell:hover:not(.no-cell) {
            transform: translateY(-2px);
            border-color: var(--primary-light);
            background: rgba(255, 255, 255, 0.1);
        }

        .cell.active {
            background: rgba(99, 102, 241, 0.2);
            border-color: #6366f1;
            color: #fff;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.3);
        }

        /* 和音チェックポイント（q付き） */
        .cell.chord-check {
            border-color: rgba(244, 114, 182, 0.5);
            background: rgba(244, 114, 182, 0.05);
            color: #f472b6;
        }

        .cell.chord-check.active {
            background: rgba(244, 114, 182, 0.2);
            border-color: #f472b6;
            color: #fff;
            box-shadow: 0 0 15px rgba(244, 114, 182, 0.3);
        }

        .cell.start {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border-color: #60a5fa;
            color: white;
            box-shadow: 0 0 20px rgba(37, 99, 235, 0.4);
        }

        .cell.no-cell {
            border: none !important;
            background: transparent !important;
            cursor: default;
            color: transparent !important;
            pointer-events: none;
        }

        /* 演奏中のハイライト */
        .cell.playing {
            transform: scale(1.15);
            z-index: 10;
            border-color: #fff !important;
            background: #fff !important;
            color: #0f172a !important;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.5);
        }

        .cell.ok {
            background: #22c55e !important;
            border-color: #4ade80 !important;
            color: white !important;
        }

        .cell.ng {
            background: #ef4444 !important;
            border-color: #f87171 !important;
            color: white !important;
            animation: shake 0.4s cubic-bezier(.36, .07, .19, .97) both;
        }

        @keyframes shake {

            10%,
            90% {
                transform: translate3d(-1px, 0, 0);
            }

            20%,
            80% {
                transform: translate3d(2px, 0, 0);
            }

            30%,
            50%,
            70% {
                transform: translate3d(-4px, 0, 0);
            }

            40%,
            60% {
                transform: translate3d(4px, 0, 0);
            }
        }

        /* プレイヤーアイコン */
        .player-cursor {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.9);
            position: absolute;
            pointer-events: none;
            z-index: 20;
            transition: left 0.25s cubic-bezier(0.34, 1.56, 0.64, 1), top 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform: translate(-50%, -50%);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: #4f46e5;
        }

        /* タイムライン（伴奏） */
        .timeline-container {
            display: flex;
            gap: 4px;
            padding: 12px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            overflow-x: auto;
            position: relative;
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.1) transparent;
        }

        .timeline-slot {
            min-width: 44px;
            height: 60px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.02);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #64748b;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .timeline-slot.active-chord {
            background: rgba(99, 102, 241, 0.1);
            color: #818cf8;
            border-color: rgba(99, 102, 241, 0.3);
        }

        .timeline-cursor {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 2px;
            background: #f472b6;
            z-index: 30;
            box-shadow: 0 0 10px #f472b6;
            transition: left 0s linear;
            /* JSで制御 */
            display: none;
        }

        /* UIパーツ */
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4f46e5, #4338ca);
            color: white;
            padding: 10px 24px;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.2s;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #4338ca, #3730a3);
            transform: translateY(-1px);
            box-shadow: 0 6px 8px -1px rgba(0, 0, 0, 0.4);
        }

        .stage-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
        }

        .stage-card:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            transform: scale(1.02);
        }

        /* 画面切り替えアニメーション */
        .screen {
            display: none;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .screen.active {
            display: flex;
            opacity: 1;
        }
    </style>
</head>

<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <!-- タイトル/ステージ選択画面 -->
    <div id="start-screen" class="screen active flex-col items-center w-full max-w-4xl">
        <h1 class="text-6xl font-bold mb-2 text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-pink-400">
            Melody Maze</h1>
        <p class="text-slate-400 mb-12 text-xl">音を繋いで、メロディを奏でよう</p>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 w-full px-4">
            <!-- JSでステージ生成 -->
            <div id="stage-list" class="col-span-full grid grid-cols-1 md:grid-cols-3 gap-6 w-full"></div>
        </div>
    </div>

    <!-- ゲームプレイ画面 -->
    <div id="game-screen" class="screen flex-col items-center w-full max-w-3xl space-y-6">
        <header class="w-full flex justify-between items-center glass-panel p-4">
            <div>
                <h2 id="level-title" class="text-xl font-bold text-white">Level 1</h2>
                <p class="text-xs text-slate-400">Startからドラッグしてゴールを目指そう</p>
            </div>
            <div class="flex items-center gap-4">
                <div class="text-right">
                    <div class="text-xs text-slate-400 uppercase tracking-wider">Steps</div>
                    <div class="text-2xl font-mono font-bold text-indigo-400"><span id="step-counter">0</span> / <span
                            id="target-steps">13</span></div>
                </div>
                <button id="back-btn" class="text-sm text-slate-400 hover:text-white transition-colors">Exit</button>
            </div>
        </header>

        <div class="relative group">
            <div
                class="absolute -inset-1 bg-gradient-to-r from-indigo-500 to-pink-500 rounded-2xl blur opacity-25 group-hover:opacity-50 transition duration-1000">
            </div>
            <div id="grid" class="grid-container relative"> <!-- マス生成 --> </div>
            <!-- プレイヤー -->
            <div id="player" class="player-cursor hidden">♪</div>
        </div>

        <div class="w-full glass-panel p-4 space-y-2">
            <div class="flex justify-between items-end mb-2">
                <span class="text-xs font-bold text-slate-500 uppercase tracking-wider">Accompaniment</span>
                <span id="status-message" class="text-sm font-medium text-indigo-300 h-5">ドラッグしてパスを作ろう</span>
            </div>
            <div class="relative">
                <div id="timeline" class="timeline-container">
                    <div id="timeline-cursor" class="timeline-cursor"></div>
                    <!-- タイムラインスロット生成 -->
                </div>
            </div>
            <div class="flex justify-end pt-2">
                <button id="reset-btn"
                    class="text-xs px-3 py-1 rounded border border-slate-600 hover:bg-slate-700 text-slate-400 transition-colors">Reset
                    Path</button>
            </div>
        </div>
    </div>

    <!-- クリアモーダル -->
    <div id="result-modal"
        class="fixed inset-0 bg-black/80 flex items-center justify-center z-50 hidden opacity-0 transition-opacity duration-300">
        <div class="glass-panel p-8 text-center max-w-sm w-full mx-4 transform scale-90 transition-transform duration-300"
            id="result-content">
            <h3 class="text-3xl font-bold text-white mb-2">Perfect Harmony!</h3>
            <p class="text-slate-300 mb-8">素晴らしい演奏でした！</p>
            <div class="space-y-3">
                <button id="replay-btn" class="btn-primary w-full py-3">Play Again</button>
                <button id="next-level-btn"
                    class="w-full py-3 rounded-lg border border-slate-600 text-slate-300 hover:bg-slate-800 transition-colors">Select
                    Level</button>
            </div>
        </div>
    </div>

    <script>
        // --- Level Data ---
        const LEVELS = [
            {
                id: 1,
                title: "Ex.1 C Major Scale",
                desc: "ドレミファソラシドの基本スケール",
                difficulty: "Easy",
                targetSteps: 13,
                accompaniment: "CEG,.,.,.,CFA,.,.,.,DGB,.,.,.,CEG",
                grid: [
                    "S,Gq,F,E,D,Cq",
                    ".,A,.,G,.,D",
                    "x,F,G,Aq,G,E",
                    ".,A,.,C5,.,F",
                    "x,Bq,A,G,B,C5q"
                ]
            },
            {
                id: 2,
                title: "Ex.2 Twinkle Star",
                desc: "きらきら星のメロディ",
                difficulty: "Medium",
                targetSteps: 15,
                accompaniment: "C,.,C,.,F,.,C,.,G,.,C,.,G,.,C,.", // Simplistic accompaniment
                grid: [
                    "Cq,G,G,A,A,Gq",
                    ".,.,.,.,.,.",
                    "S,.,F,F,E,E",
                    ".,.,.,.,.,D",
                    "x,G,F,E,D,Cq"
                ]
            },
            {
                id: 3,
                title: "Ex.3 Arpeggio",
                desc: "和音を分散させて奏でよう",
                difficulty: "Hard",
                targetSteps: 13,
                accompaniment: "C,E,G,.,F,A,C5,.,G,B,D5,.,C,E,G",
                grid: [
                    "S,E,G,C5,A,F",
                    ".,.,.,.,.,A",
                    "G,B,D5,D5,B,G",
                    "E,.,.,.,.,.",
                    "Cq,.,.,.,.,."
                ]
            }
        ];

        // --- Audio System ---
        const AudioSys = {
            ctx: null,
            init: function () {
                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (this.ctx.state === 'suspended') {
                    this.ctx.resume();
                }
            },

            // Note frequencies
            freqs: {
                'C': 261.63, 'C#': 277.18, 'D': 293.66, 'D#': 311.13, 'E': 329.63,
                'F': 349.23, 'F#': 369.99, 'G': 392.00, 'G#': 415.30, 'A': 440.00,
                'A#': 466.16, 'B': 493.88
            },

            getFreq: function (noteStr) {
                if (!noteStr || ['S', '.', 'x'].includes(noteStr)) return null;
                const match = noteStr.match(/([A-G]#?)/);
                if (!match) return null;
                const note = match[1];

                let octave = 4;
                if (noteStr.includes('5')) octave = 5;
                if (noteStr.includes('3')) octave = 3;

                return this.freqs[note] * Math.pow(2, octave - 4);
            },

            playTone: function (freq, type = 'sine', duration = 0.5, volume = 0.2, startTime = 0) {
                if (!freq || !this.ctx) return;
                const t = startTime || this.ctx.currentTime;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();

                osc.type = type;
                osc.frequency.setValueAtTime(freq, t);

                // Envelope
                gain.gain.setValueAtTime(0, t);
                gain.gain.linearRampToValueAtTime(volume, t + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.001, t + duration);

                osc.connect(gain);
                gain.connect(this.ctx.destination);

                osc.start(t);
                osc.stop(t + duration);
            },

            playChord: function (chordStr) {
                if (!chordStr || chordStr === '.') return;
                const notes = chordStr.match(/[A-G]#?/g);
                if (notes) {
                    notes.forEach(n => this.playTone(this.getFreq(n), 'triangle', 1.0, 0.08));
                }
            }
        };

        // --- Game State ---
        let currentLevel = null;
        let path = []; // [{r, c}]
        let isDragging = false;
        let isPlaying = false;
        let gridData = [];
        let accData = [];

        // --- DOM Elements ---
        const els = {
            screens: {
                start: document.getElementById('start-screen'),
                game: document.getElementById('game-screen')
            },
            stageList: document.getElementById('stage-list'),
            grid: document.getElementById('grid'),
            player: document.getElementById('player'),
            timeline: document.getElementById('timeline'),
            timelineCursor: document.getElementById('timeline-cursor'),
            stepCounter: document.getElementById('step-counter'),
            targetSteps: document.getElementById('target-steps'),
            status: document.getElementById('status-message'),
            levelTitle: document.getElementById('level-title'),
            modal: {
                self: document.getElementById('result-modal'),
                content: document.getElementById('result-content'),
                replay: document.getElementById('replay-btn'),
                next: document.getElementById('next-level-btn')
            },
            resetBtn: document.getElementById('reset-btn'),
            backBtn: document.getElementById('back-btn')
        };

        // --- Core Functions ---

        function init() {
            renderStageList();
            setupEvents();
        }

        function renderStageList() {
            els.stageList.innerHTML = LEVELS.map(lvl => `
                <div class="stage-card" onclick="startGame(${lvl.id})">
                    <div class="flex justify-between items-start mb-2">
                        <span class="text-xs font-bold text-indigo-400 bg-indigo-400/10 px-2 py-1 rounded">${lvl.difficulty}</span>
                        <span class="text-xs text-slate-500">Ex.${lvl.id}</span>
                    </div>
                    <h3 class="text-xl font-bold text-white mb-1">${lvl.title.replace(/^Ex\.\d+\s/, '')}</h3>
                    <p class="text-sm text-slate-400 mb-4">${lvl.desc}</p>
                    <div class="flex items-center text-xs text-slate-500 gap-4">
                        <span>Steps: ${lvl.targetSteps}</span>
                    </div>
                </div>
            `).join('');
        }

        function startGame(levelId) {
            currentLevel = LEVELS.find(l => l.id === levelId);
            if (!currentLevel) return;

            gridData = currentLevel.grid.map(row => row.split(','));
            accData = currentLevel.accompaniment.split(',');

            // Reset State
            path = [];
            isDragging = false;
            isPlaying = false;

            // Switch Screen
            els.screens.start.classList.remove('active');
            setTimeout(() => {
                els.screens.start.style.display = 'none';
                els.screens.game.style.display = 'flex';
                // Trigger reflow
                void els.screens.game.offsetWidth;
                els.screens.game.classList.add('active');
            }, 400);

            // Update UI
            els.levelTitle.innerText = currentLevel.title;
            els.targetSteps.innerText = currentLevel.targetSteps;

            renderGrid();
            renderTimeline();
            updateStepCount();
            setStatus("Startからドラッグしてください");

            AudioSys.init(); // Init Audio Context on user interaction
        }

        function returnToMenu() {
            els.screens.game.classList.remove('active');
            els.modal.self.classList.add('hidden');
            setTimeout(() => {
                els.screens.game.style.display = 'none';
                els.screens.start.style.display = 'flex';
                void els.screens.start.offsetWidth;
                els.screens.start.classList.add('active');
            }, 400);
        }

        function renderGrid() {
            els.grid.innerHTML = '';
            els.grid.appendChild(els.player);

            gridData.forEach((row, r) => {
                row.forEach((cellStr, c) => {
                    const div = document.createElement('div');
                    div.className = 'cell';
                    div.dataset.r = r;
                    div.dataset.c = c;

                    const isMasked = (r % 2 === 1 && c % 2 === 0);

                    if (cellStr === 'x' || isMasked) {
                        div.classList.add('no-cell');
                    } else if (cellStr === 'S') {
                        div.classList.add('start');
                        div.innerHTML = 'S';
                        path = [{ r, c }]; // Init path
                    } else {
                        if (cellStr.includes('q')) div.classList.add('chord-check');
                        const label = cellStr.replace(/[0-9q]/g, '');
                        div.innerHTML = label === '.' ? '' : label;
                    }

                    // Events
                    div.onmousedown = (e) => handleInputStart(r, c);
                    div.onmouseenter = (e) => handleInputMove(r, c);

                    els.grid.appendChild(div);
                });
            });

            updatePlayerPos(path[0].r, path[0].c);
            els.player.classList.remove('hidden');
        }

        function renderTimeline() {
            // Remove existing slots except cursor
            Array.from(els.timeline.children).forEach(c => {
                if (c.id !== 'timeline-cursor') c.remove();
            });

            accData.forEach((chord, i) => {
                const slot = document.createElement('div');
                slot.className = 'timeline-slot';
                slot.innerHTML = `
                    <span class="font-bold ${chord !== '.' ? 'text-indigo-400' : 'text-slate-600'}">${chord === '.' ? '•' : chord}</span>
                    <span class="text-[10px] opacity-50 mt-1">${i + 1}</span>
                `;
                els.timeline.appendChild(slot);
            });
        }

        // --- Interaction Logic ---

        function handleInputStart(r, c) {
            if (isPlaying) return;
            const cellStr = gridData[r][c];

            // Sをクリックでリセットして開始
            if (cellStr === 'S') {
                resetPath();
                isDragging = true;
                setStatus("探索中...");
                return;
            }

            // 現在のパスの最後尾ならドラッグ再開
            const last = path[path.length - 1];
            if (last.r === r && last.c === c) {
                isDragging = true;
                setStatus("探索中...");
            }
        }

        function handleInputMove(r, c) {
            if (!isDragging || isPlaying) return;

            const last = path[path.length - 1];

            // バックトラック（戻る）判定
            if (path.length > 1) {
                const prev = path[path.length - 2];
                if (prev.r === r && prev.c === c) {
                    // 戻った
                    const popped = path.pop();
                    const el = getCell(popped.r, popped.c);
                    if (el) el.classList.remove('active', 'ok', 'ng');
                    updatePlayerPos(r, c);
                    updateStepCount();
                    // 音を鳴らす（オプション）
                    return;
                }
            }

            const isAdjacent = Math.abs(last.r - r) + Math.abs(last.c - c) === 1;
            const alreadyInPath = path.some(p => p.r === r && p.c === c);
            const isMasked = (r % 2 === 1 && c % 2 === 0);
            const isVoid = gridData[r][c] === 'x';

            if (isAdjacent && !alreadyInPath && !isMasked && !isVoid) {
                if (path.length <= currentLevel.targetSteps) {
                    path.push({ r, c });
                    getCell(r, c).classList.add('active');
                    updatePlayerPos(r, c);
                    updateStepCount();

                    // --- 伴奏再生と判定の即時反映 ---
                    const cellStr = gridData[r][c];
                    const stepIdx = path.length - 2;
                    const chord = accData[stepIdx] || ".";
                    AudioSys.playChord(chord);

                    const cellEl = getCell(r, c);
                    const isHarmonious = playMelody(cellStr, chord);

                    if (cellStr.includes('q')) {
                        if (isHarmonious) {
                            cellEl.classList.add('ok');
                        } else {
                            cellEl.classList.add('ng');
                        }
                    }

                    if (path.length === currentLevel.targetSteps + 1) {
                        isDragging = false;
                        startPerformance();
                    }
                }
            }
        }

        window.addEventListener('mouseup', () => {
            isDragging = false;
        });

        // --- Game Logic ---

        function updatePlayerPos(r, c) {
            // Grid layout: 64px cell + 12px gap
            const cellSize = 64;
            const gap = 12;
            const left = c * (cellSize + gap) + cellSize / 2 + 16; // 16 is container padding
            const top = r * (cellSize + gap) + cellSize / 2 + 16;

            els.player.style.left = `${left}px`;
            els.player.style.top = `${top}px`;
        }

        function getCell(r, c) {
            return document.querySelector(`.cell[data-r="${r}"][data-c="${c}"]`);
        }

        function updateStepCount() {
            els.stepCounter.innerText = path.length - 1;
        }

        function setStatus(msg) {
            els.status.innerText = msg;
        }

        function resetPath() {
            path = path.filter((p, i) => i === 0); // Keep start only
            document.querySelectorAll('.cell').forEach(c => c.classList.remove('active', 'ok', 'ng', 'playing'));
            updatePlayerPos(path[0].r, path[0].c);
            updateStepCount();
            setStatus("リセットしました");
        }

        // --- Performance/Validation ---

        async function startPerformance() {
            isPlaying = true;
            setStatus("演奏中...");
            let allOk = true;

            // Player reset to start
            updatePlayerPos(path[0].r, path[0].c);
            await wait(500);

            els.timelineCursor.style.display = 'block';

            for (let i = 1; i < path.length; i++) {
                const { r, c } = path[i];
                const musicIdx = i - 1;
                const chord = accData[musicIdx] || ".";
                const cellStr = gridData[r][c];

                // Timeline cursor
                const slotWidth = 44 + 4; // width + gap
                els.timelineCursor.style.left = `${musicIdx * slotWidth + 12 + 22}px`;

                // Highlight Timeline Slot
                const slots = els.timeline.querySelectorAll('.timeline-slot');
                if (slots[musicIdx]) slots[musicIdx].classList.add('active-chord');

                // Move Player
                updatePlayerPos(r, c);
                const cellEl = getCell(r, c);
                cellEl.classList.add('playing');

                // Play Audio
                AudioSys.playChord(chord);
                const isHarmonious = playMelody(cellStr, chord);

                // Validation
                if (cellStr.includes('q')) {
                    if (isHarmonious) {
                        cellEl.classList.add('ok');
                    } else {
                        cellEl.classList.add('ng');
                        allOk = false;
                    }
                }

                await wait(500); // テンポ

                cellEl.classList.remove('playing');
                if (slots[musicIdx]) slots[musicIdx].classList.remove('active-chord');
            }

            els.timelineCursor.style.display = 'none';
            isPlaying = false;

            if (allOk) {
                setStatus("クリア！");
                showResult();
            } else {
                setStatus("和音が合いませんでした...");
            }
        }

        function playMelody(cellStr, chord) {
            if (cellStr === 'S' || cellStr === '.') return true; // No validation needed

            const freq = AudioSys.getFreq(cellStr);
            AudioSys.playTone(freq, 'sine', 0.8, 0.2); // Slower decay for melody

            if (cellStr.includes('q')) {
                if (chord === '.') return false;
                const noteName = cellStr.match(/([A-G]#?)/)[1];
                return chord.includes(noteName);
            }
            return true;
        }

        function wait(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        function showResult() {
            els.modal.self.classList.remove('hidden');
            requestAnimationFrame(() => {
                els.modal.self.classList.remove('opacity-0');
                els.modal.content.classList.remove('scale-90');
            });
        }

        // --- Event Listeners ---
        function setupEvents() {
            els.backBtn.onclick = returnToMenu;
            els.resetBtn.onclick = () => { if (!isPlaying) resetPath(); };

            els.modal.replay.onclick = () => {
                els.modal.self.classList.add('opacity-0');
                setTimeout(() => {
                    els.modal.self.classList.add('hidden');
                    resetPath();
                }, 300);
            };

            els.modal.next.onclick = returnToMenu;
        }

        // --- Boot ---
        window.onload = init;

    </script>
</body>

</html>
