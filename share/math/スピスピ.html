    function App() {
      const [gameState, setGameState] = useState('start');
      const [selectedCourse, setSelectedCourse] = useState(null);
      const [countdownPhase, setCountdownPhase] = useState('info');
      const [countdownCount, setCountdownCount] = useState(3);
      const [time, setTime] = useState(0);

      const [score, setScore] = useState(0);
      const [resultStep, setResultStep] = useState(0);

      const [selectedChoices, setSelectedChoices] = useState([]);

      const [isChecking, setIsChecking] = useState(false);
      const [isCorrect, setIsCorrect] = useState(false);

      const audioCtxRef = useRef(null);

      const initAudio = () => {
        if (!audioCtxRef.current) {
          audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
        }
      };

      const playSound = (type) => {
        initAudio();
        const ctx = audioCtxRef.current;
        if (!ctx) return;
        if (ctx.state === 'suspended') ctx.resume();

        const t = ctx.currentTime;
        const playTone = (freq, waveType, time, dur, vol) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = waveType;
          osc.frequency.value = freq;
          osc.connect(gain);
          gain.connect(ctx.destination);
          gain.gain.setValueAtTime(vol, time);
          gain.gain.exponentialRampToValueAtTime(0.001, time + dur);
          osc.start(time);
          osc.stop(time + dur);
        };

        switch (type) {
          case 'click': playTone(800, 'sine', t, 0.05, 0.1); break;
          case 'delete': playTone(300, 'triangle', t, 0.05, 0.1); break;
          case 'countdown': playTone(880, 'sine', t, 0.1, 0.1); break;
          case 'start': playTone(1760, 'sine', t, 0.4, 0.1); break;
          case 'pop': playTone(600, 'sine', t, 0.1, 0.1); break;
          case 'correct':
            playTone(880, 'sine', t, 0.15, 0.1);
            playTone(1108.73, 'sine', t + 0.15, 0.3, 0.1);
            break;
          case 'wrong': playTone(150, 'sawtooth', t, 0.3, 0.05); break;
          case 'fanfare':
            playTone(523.25, 'triangle', t, 0.8, 0.1);
            playTone(659.25, 'triangle', t, 0.8, 0.1);
            playTone(783.99, 'triangle', t, 0.8, 0.1);
            break;
          default: break;
        }
      };

      useEffect(() => {
        if (gameState === 'countdown') {
          if (countdownPhase === 'info') {
            const timer = setTimeout(() => { setCountdownPhase('counting'); }, 4000);
            return () => clearTimeout(timer);
          } else if (countdownPhase === 'counting') {
            if (countdownCount > 0) {
              playSound('countdown');
              const timer = setTimeout(() => { setCountdownCount(c => c - 1); }, 1000);
              return () => clearTimeout(timer);
            } else {
              playSound('start');
              const timer = setTimeout(() => { setGameState('playing'); }, 800);
              return () => clearTimeout(timer);
            }
          }
        }
      }, [gameState, countdownPhase, countdownCount]);

      useEffect(() => {
        if (gameState === 'result') {
          setResultStep(0);
          const t1 = setTimeout(() => { setResultStep(1); playSound('pop'); }, 600);
          const t2 = setTimeout(() => { setResultStep(2); playSound('pop'); }, 1400);
          const t3 = setTimeout(() => { setResultStep(3); playSound('fanfare'); }, 2400);
          const t4 = setTimeout(() => { setResultStep(4); }, 3200);
          return () => { clearTimeout(t1); clearTimeout(t2); clearTimeout(t3); clearTimeout(t4); };
        }
      }, [gameState]);

      useEffect(() => {
        let timer;
        let lastTick = Date.now();
        if (gameState === 'playing' && !isChecking) {
          timer = setInterval(() => {
            const now = Date.now();
            const delta = (now - lastTick) / 1000;
            setTime(t => t + delta);
            lastTick = now;

        setCurrentIndex(0);
        setScore(0);

          const sortedUser = [...userAnswer].sort();
          const sortedCorrect = [...currentQ.answer].sort();
          isCorrectAns = JSON.stringify(sortedUser) === JSON.stringify(sortedCorrect);
        } else {
          isCorrectAns = String(userAnswer) === String(currentQ.answer);
        }

        if (isCorrectAns) { setScore(s => s + 1); playSound('correct'); } else { playSound('wrong'); }
        setIsCorrect(isCorrectAns);
        setIsChecking(true);

          setIsChecking(false);
          if (currentIndex + 1 < currentQuestions.length) { setCurrentIndex(i => i + 1); } else { setGameState('result'); }
        }, 800);

        if (newChoices.length === 2) {

        let scoreGrade = 'C';
        let scoreVal = 0;
        const ratio = correctCount / totalQuestions;
        if (ratio === 1) { scoreGrade = 'S'; scoreVal = 6; }
        else if (ratio >= 0.7) { scoreGrade = 'A'; scoreVal = 4; }
        else if (ratio >= 0.5) { scoreGrade = 'B'; scoreVal = 2; }
        else { scoreGrade = 'C'; scoreVal = 0; }

        let timeGrade = 'C';
        let timeVal = 0;
        const timeRatio = timeTaken / totalQuestions;
        if (timeRatio <= 10) { timeGrade = 'S'; timeVal = 3; }
        else if (timeRatio <= 15) { timeGrade = 'A'; timeVal = 2; }
        else if (timeRatio <= 20) { timeGrade = 'B'; timeVal = 1; }
        else { timeGrade = 'C'; timeVal = 0; }

        const totalVal = scoreVal + timeVal;
        let totalGrade = 'C';
        if (totalVal >= 8) totalGrade = 'S';
        else if (totalVal >= 5) totalGrade = 'A';
        else if (totalVal >= 3) totalGrade = 'B';
        else totalGrade = 'C';

        return { scoreGrade, timeGrade, totalGrade };
      };
