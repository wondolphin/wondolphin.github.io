<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat Messenger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .chat-container { height: calc(100vh - 180px); }
        .message-appear { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .dot-pulse {
            animation: pulse 1.5s infinite ease-in-out;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.4; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 leading-relaxed overflow-hidden">

    <div class="max-w-4xl mx-auto h-screen flex flex-col px-4">
        <!-- Header -->
        <header class="py-6 flex justify-between items-center border-b border-slate-200">
            <div>
                <h1 class="text-xl font-bold text-slate-800 flex items-center gap-2">
                    <span class="w-3 h-3 bg-green-500 rounded-full"></span>
                    Gemini AI Chat
                </h1>
                <p class="text-[10px] text-slate-400 uppercase tracking-widest mt-0.5">Online API Edition</p>
            </div>
            <button id="reset-btn" class="text-xs font-semibold text-slate-400 hover:text-red-500 transition-colors">
                会話をクリア
            </button>
        </header>

        <!-- Chat Area -->
        <div id="chat-history" class="chat-container overflow-y-auto py-6 space-y-6">
            <!-- Welcome Message -->
            <div class="flex justify-start message-appear">
                <div class="bg-white border border-slate-200 rounded-2xl px-5 py-3 max-w-[85%] text-sm shadow-sm">
                    こんにちは！通信を利用したAIチャットへようこそ。
                    モデルのロードなしですぐにお話しいただけます。何かお手伝いしましょうか？
                </div>
            </div>
        </div>

        <!-- Thinking Indicator (Hidden by default) -->
        <div id="thinking" class="hidden flex justify-start mb-4 px-2">
            <div class="flex gap-1 items-center bg-slate-100 px-4 py-2 rounded-full">
                <div class="w-1.5 h-1.5 bg-slate-400 rounded-full dot-pulse"></div>
                <div class="w-1.5 h-1.5 bg-slate-400 rounded-full dot-pulse" style="animation-delay: 0.2s"></div>
                <div class="w-1.5 h-1.5 bg-slate-400 rounded-full dot-pulse" style="animation-delay: 0.4s"></div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="pb-8 pt-2">
            <form id="chat-form" class="relative group">
                <input 
                    type="text" 
                    id="user-input" 
                    autocomplete="off"
                    placeholder="AIにメッセージを送る..." 
                    class="w-full bg-white border border-slate-200 rounded-2xl pl-5 pr-14 py-4 focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all shadow-sm text-sm group-hover:border-slate-300"
                >
                <button 
                    type="submit" 
                    id="send-btn"
                    class="absolute right-2 top-2 bottom-2 bg-blue-600 hover:bg-blue-700 text-white px-4 rounded-xl transition-all disabled:opacity-30 disabled:hover:bg-blue-600"
                >
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
                </button>
            </form>
            <p class="text-[10px] text-center text-slate-400 mt-3">Powered by Gemini 2.5 Flash</p>
        </div>
    </div>

    <!-- Custom Error Modal -->
    <div id="error-modal" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-6 max-w-sm w-full shadow-2xl">
            <div class="w-12 h-12 bg-red-100 text-red-600 rounded-full flex items-center justify-center mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            </div>
            <h3 class="text-lg font-bold text-slate-800 mb-2">エラーが発生しました</h3>
            <p id="error-message" class="text-sm text-slate-500 mb-6"></p>
            <button onclick="document.getElementById('error-modal').classList.add('hidden')" class="w-full bg-slate-900 text-white py-3 rounded-xl font-semibold hover:bg-slate-800 transition-all">閉じる</button>
        </div>
    </div>

    <script>
        // API Configuration
        const apiKey = ""; // 実行環境から自動的に提供されます
        const model = "gemini-2.5-flash-preview-09-2025";
        const systemPrompt = "あなたは親切なAIアシスタントです。簡潔かつ丁寧に、日本語で回答してください。";

        const chatHistory = document.getElementById('chat-history');
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const thinkingIndicator = document.getElementById('thinking');
        const resetBtn = document.getElementById('reset-btn');

        // 会話履歴の管理（Gemini APIの形式）
        let conversationHistory = [];

        function addMessage(role, text) {
            const wrapper = document.createElement('div');
            wrapper.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} message-appear`;
            
            const div = document.createElement('div');
            div.className = `${role === 'user' ? 'bg-blue-600 text-white shadow-blue-100' : 'bg-white border border-slate-200 text-slate-800 shadow-sm'} rounded-2xl px-5 py-3 max-w-[85%] text-sm whitespace-pre-wrap`;
            div.innerText = text;
            
            wrapper.appendChild(div);
            chatHistory.appendChild(wrapper);
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        function showError(msg) {
            document.getElementById('error-message').innerText = msg;
            document.getElementById('error-modal').classList.remove('hidden');
        }

        // 指数バックオフを伴うAPIコール
        async function fetchWithRetry(prompt, history, retryCount = 0) {
            const maxRetries = 5;
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
            
            const payload = {
                contents: [
                    ...history,
                    { role: "user", parts: [{ text: prompt }] }
                ],
                systemInstruction: { parts: [{ text: systemPrompt }] }
            };

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.status === 429 && retryCount < maxRetries) {
                    const delay = Math.pow(2, retryCount) * 1000;
                    await new Promise(res => setTimeout(res, delay));
                    return fetchWithRetry(prompt, history, retryCount + 1);
                }

                if (!response.ok) {
                    const errData = await response.json();
                    throw new Error(errData.error?.message || "APIリクエストに失敗しました");
                }

                return await response.json();
            } catch (err) {
                if (retryCount < maxRetries) {
                    const delay = Math.pow(2, retryCount) * 1000;
                    await new Promise(res => setTimeout(res, delay));
                    return fetchWithRetry(prompt, history, retryCount + 1);
                }
                throw err;
            }
        }

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = userInput.value.trim();
            if (!text) return;

            // UIの更新
            addMessage('user', text);
            userInput.value = '';
            userInput.disabled = true;
            sendBtn.disabled = true;
            thinkingIndicator.classList.remove('hidden');
            chatHistory.scrollTop = chatHistory.scrollHeight;

            try {
                const result = await fetchWithRetry(text, conversationHistory);
                const aiResponse = result.candidates?.[0]?.content?.parts?.[0]?.text || "申し訳ありません、返答を取得できませんでした。";

                // 履歴に追加
                conversationHistory.push({ role: "user", parts: [{ text: text }] });
                conversationHistory.push({ role: "model", parts: [{ text: aiResponse }] });

                // AIメッセージを表示
                addMessage('model', aiResponse);

            } catch (err) {
                console.error(err);
                showError(err.message);
            } finally {
                thinkingIndicator.classList.add('hidden');
                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.focus();
            }
        });

        resetBtn.addEventListener('click', () => {
            if (confirm('会話履歴をクリアしますか？')) {
                conversationHistory = [];
                chatHistory.innerHTML = '';
                addMessage('model', '会話をリセットしました。何か御用はありますか？');
            }
        });

        // 初期フォーカス
        userInput.focus();
    </script>
</body>
</html>
