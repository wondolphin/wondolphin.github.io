<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Physics Painter - Puzzle Game</title>
    <!-- 凹型の図形を扱うためのライブラリ -->
    <script src="https://cdn.jsdelivr.net/npm/poly-decomp@0.3.0/dist/poly-decomp.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; overflow: hidden; }
        canvas { display: block; background: #1e293b; border-bottom: 4px solid #334155; }
        .loader {
            width: 20px; height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #canvas-container { position: relative; }
        .drawing-zone-hint {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 200px;
            border-bottom: 2px dashed rgba(255,255,255,0.1);
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.2);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
    </style>
</head>
<body class="flex flex-col h-screen">

<div class="flex-1 flex flex-col items-center justify-center p-4">
    <div class="w-full max-w-[600px] flex justify-between items-end mb-2 px-2">
        <div>
            <h1 class="text-xl font-bold text-indigo-400">AI Physics Painter</h1>
            <p id="level-info" class="text-sm text-slate-400">コインをすべて集めてください</p>
        </div>
        <div class="text-right">
            <span class="text-xs uppercase text-slate-500">Coins</span>
            <div id="score-display" class="text-2xl font-mono">0 / 0</div>
        </div>
    </div>

    <div id="canvas-container" class="rounded-xl overflow-hidden shadow-2xl border border-slate-700">
        <div class="drawing-zone-hint">AI Drawing Zone (200px)</div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <div class="w-full max-w-[600px] mt-4 space-y-3">
        <div class="status-bar text-center text-sm h-5 text-slate-400" id="statusLabel">待機中...</div>
        
        <div class="flex gap-2">
            <input type="text" id="promptInput" 
                class="flex-1 bg-slate-800 border border-slate-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-indigo-500 transition-colors"
                placeholder="例: 重い球を描いて、長い板を描いて..."
                autofocus>
            <button id="drawBtn" class="bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 disabled:cursor-not-allowed text-white font-bold py-3 px-6 rounded-lg transition-all flex items-center gap-2">
                <span id="btnLabel">生成</span>
            </button>
        </div>
        
        <div class="flex gap-2">
            <button id="resetLevelBtn" class="flex-1 bg-slate-700 hover:bg-slate-600 text-slate-200 py-2 rounded-lg text-sm transition-colors">
                ステージをリセット
            </button>
            <button id="clearLinesBtn" class="flex-1 bg-slate-700 hover:bg-slate-600 text-slate-200 py-2 rounded-lg text-sm transition-colors">
                物体のみ消去
            </button>
        </div>
    </div>
</div>

<div id="clearModal" class="fixed inset-0 bg-slate-900/80 hidden items-center justify-center z-50">
    <div class="bg-slate-800 p-8 rounded-2xl border border-indigo-500 text-center shadow-2xl">
        <h2 class="text-3xl font-bold text-white mb-2">Stage Clear!</h2>
        <p class="text-slate-400 mb-6">すべてのコインを回収しました！</p>
        <button onclick="resetGame()" class="bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 px-8 rounded-xl transition-all">
            もう一度遊ぶ
        </button>
    </div>
</div>

<script>
    const apiKey = ""; 
    const { Engine, Render, Runner, Bodies, Composite, Events, Vector, Body, Common, Vertices } = Matter;

    // poly-decomp ライブラリを登録
    if (typeof decomp !== 'undefined') {
        Common.setDecomp(decomp);
    }

    const WIDTH = 600;
    const HEIGHT = 600;
    const SPAWN_ZONE_HEIGHT = 200;
    
    let engine, runner, canvas, ctx;
    let coins = [];
    let playerObjects = [];
    let isGenerating = false;
    let totalCoins = 0;
    let collectedCoins = 0;

    window.onload = () => {
        initPhysics();
        createLevel();
        requestAnimationFrame(gameLoop);
    };

    function initPhysics() {
        canvas = document.getElementById('gameCanvas');
        canvas.width = WIDTH;
        canvas.height = HEIGHT;
        ctx = canvas.getContext('2d');

        engine = Engine.create();
        // 貫通防止のため計算精度を上げる
        engine.constraintIterations = 4;
        engine.positionIterations = 6;
        
        runner = Runner.create();
        Runner.run(runner, engine);

        // 衝突検知
        Events.on(engine, 'collisionStart', (event) => {
            event.pairs.forEach((pair) => {
                // 親ボディを参照することで、分解されたパーツでも正しく判定
                const bodyA = pair.bodyA.parent || pair.bodyA;
                const bodyB = pair.bodyB.parent || pair.bodyB;
                checkCoinCollision(bodyA, bodyB);
            });
        });
    }

    function createLevel() {
        // 壁を厚くして、反発係数を調整
        const obstacleOptions = { 
            isStatic: true, 
            restitution: 0.9, 
            friction: 0.1,
            label: 'wall',
            render: { fillStyle: '#475569' }
        };
        
        const walls = [
            Bodies.rectangle(150, 350, 200, 40, obstacleOptions),
            Bodies.rectangle(450, 450, 200, 40, obstacleOptions),
            Bodies.rectangle(300, 550, 150, 40, obstacleOptions)
        ];

        const coinPositions = [
            { x: 150, y: 290 },
            { x: 450, y: 390 },
            { x: 300, y: 490 },
            { x: 80, y: 550 },
            { x: 520, y: 550 }
        ];

        coins = coinPositions.map(pos => {
            const coin = Bodies.circle(pos.x, pos.y, 18, {
                isStatic: true,
                isSensor: true,
                label: 'coin'
            });
            coin.isCollected = false;
            return coin;
        });

        totalCoins = coins.length;
        collectedCoins = 0;
        updateScore();

        Composite.add(engine.world, [...walls, ...coins]);
    }

    function checkCoinCollision(bodyA, bodyB) {
        let coinBody = null;
        if (bodyA.label === 'coin') coinBody = bodyA;
        else if (bodyB.label === 'coin') coinBody = bodyB;

        if (coinBody && !coinBody.isCollected) {
            coinBody.isCollected = true;
            Composite.remove(engine.world, coinBody);
            coins = coins.filter(c => c !== coinBody);
            collectedCoins = totalCoins - coins.length;
            updateScore();

            if (coins.length === 0) {
                setTimeout(showClearModal, 500);
            }
        }
    }

    function updateScore() {
        document.getElementById('score-display').textContent = `${collectedCoins} / ${totalCoins}`;
    }

    async function fetchWithRetry(url, options, maxRetries = 5) {
        const delays = [1000, 2000, 4000, 8000, 16000];
        for (let i = 0; i < maxRetries; i++) {
            try {
                const response = await fetch(url, options);
                if (response.ok) return await response.json();
                await new Promise(r => setTimeout(r, delays[i]));
            } catch (e) {
                if (i === maxRetries - 1) throw e;
            }
        }
    }

    async function generateObjectFromAI() {
        const prompt = document.getElementById('promptInput').value.trim();
        if (!prompt || isGenerating) return;

        setUIState(true);
        setStatus("AIが形状を計算中...");

        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
        
        const systemPrompt = `あなたは物理パズルゲームの「描画エンジン」です。
ユーザーの指示に基づき、幅600px、高さ200px内に収まる形状の座標を生成してください。

【出力形式】 { "shapes": [ { "points": [{ "x": n, "y": n }, ...] } ] }
- 座標範囲: x:0~600, y:0~200
- 図形は必ず閉じたパスにしてください。
- 頂点は20〜30個程度。
- 円形を頼まれた場合でも、多角形の頂点リストで表現してください。
- JSON以外は出力しないでください。`;

        try {
            const result = await fetchWithRetry(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }],
                    systemInstruction: { parts: [{ text: systemPrompt }] },
                    generationConfig: {
                        responseMimeType: "application/json"
                    }
                })
            });

            const data = JSON.parse(result.candidates[0].content.parts[0].text);
            spawnShapes(data.shapes);
            document.getElementById('promptInput').value = "";
        } catch (e) {
            console.error(e);
            setStatus("生成エラーが発生しました");
        } finally {
            setUIState(false);
        }
    }

    function spawnShapes(shapes) {
        if (!shapes || !Array.isArray(shapes)) return;
        
        shapes.forEach(shapeData => {
            const pts = shapeData.points;
            if (!pts || pts.length < 3) return;

            let vertices = pts.map(p => ({ x: p.x, y: p.y }));
            
            // Matter.jsが処理できるようにクリーンアップ
            vertices = Vertices.create(vertices);
            
            // 自己交差や凹凸を考慮した実体化
            const centre = Vertices.centre(vertices);
            
            const newBody = Bodies.fromVertices(
                centre.x, 
                centre.y, 
                [vertices], 
                {
                    restitution: 0.7,
                    friction: 0.1,
                    density: 0.002,
                    label: 'playerObject',
                    // スリープを防止して計算を常に回す
                    sleepThreshold: -1
                },
                true
            );

            if (newBody) {
                playerObjects.push(newBody);
                Composite.add(engine.world, newBody);
                setStatus("実体化完了！");
            } else {
                // fromVerticesが失敗した場合のフォールバック（凸包を使用）
                const hull = Vertices.hull(vertices);
                const hullCentre = Vertices.centre(hull);
                const fallbackBody = Bodies.fromVertices(hullCentre.x, hullCentre.y, [hull], {
                    restitution: 0.7,
                    label: 'playerObject'
                });
                if (fallbackBody) {
                    playerObjects.push(fallbackBody);
                    Composite.add(engine.world, fallbackBody);
                    setStatus("簡易形状で生成しました");
                }
            }
        });
    }

    function gameLoop() {
        ctx.clearRect(0, 0, WIDTH, HEIGHT);

        // ガイド
        ctx.fillStyle = 'rgba(255, 255, 255, 0.02)';
        ctx.fillRect(0, 0, WIDTH, SPAWN_ZONE_HEIGHT);

        const allBodies = Composite.allBodies(engine.world);
        
        allBodies.forEach(body => {
            // 分解されたパーツも含めてすべて描画
            body.parts.forEach((part, i) => {
                if (i === 0 && body.parts.length > 1) return;

                const vertices = part.vertices;
                if (!vertices || vertices.length === 0) return;

                ctx.beginPath();
                ctx.moveTo(vertices[0].x, vertices[0].y);
                for (let j = 1; j < vertices.length; j++) {
                    ctx.lineTo(vertices[j].x, vertices[j].y);
                }
                ctx.closePath();

                if (body.label === 'coin') {
                    ctx.fillStyle = '#fbbf24';
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = '#fbbf24';
                } else if (body.label === 'wall') {
                    ctx.fillStyle = '#475569';
                    ctx.shadowBlur = 0;
                } else {
                    ctx.fillStyle = '#6366f1';
                    ctx.strokeStyle = '#818cf8';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    ctx.shadowBlur = 0;
                }

                ctx.fill();
                ctx.shadowBlur = 0;
            });

            // 画面外削除
            if (!body.isStatic && (body.position.y > HEIGHT + 200 || body.position.x < -200 || body.position.x > WIDTH + 200)) {
                Composite.remove(engine.world, body);
                playerObjects = playerObjects.filter(o => o !== body);
            }
        });

        requestAnimationFrame(gameLoop);
    }

    function setUIState(loading) {
        isGenerating = loading;
        const btn = document.getElementById('drawBtn');
        btn.disabled = loading;
        document.getElementById('btnLabel').innerHTML = loading ? '<div class="loader"></div>' : '生成';
    }

    function setStatus(msg) {
        document.getElementById('statusLabel').textContent = msg;
    }

    function showClearModal() {
        document.getElementById('clearModal').style.display = 'flex';
    }

    function resetGame() {
        location.reload();
    }

    document.getElementById('drawBtn').onclick = generateObjectFromAI;
    document.getElementById('promptInput').onkeypress = (e) => {
        if (e.key === 'Enter') generateObjectFromAI();
    };

    document.getElementById('clearLinesBtn').onclick = () => {
        playerObjects.forEach(obj => Composite.remove(engine.world, obj));
        playerObjects = [];
        setStatus("物体を消去しました");
    };

    document.getElementById('resetLevelBtn').onclick = () => {
        location.reload();
    };
</script>
</body>
</html>
