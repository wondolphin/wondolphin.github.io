<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local AI Chat - Stability Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .chat-container { height: calc(100vh - 260px); }
    </style>
</head>
<body class="bg-slate-100 text-slate-900">

    <div class="max-w-3xl mx-auto px-4 py-8">
        <header class="mb-6 text-center">
            <h1 class="text-2xl font-bold text-slate-800">Local Browser AI (Stability)</h1>
            <p class="text-slate-500 text-xs mt-1">プレビュー環境では制限により動かない場合があります。その場合はローカル保存して実行してください。</p>
        </header>

        <!-- Status Card -->
        <div class="bg-white border border-slate-200 rounded-2xl p-5 mb-4 shadow-sm">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div id="status-dot" class="w-3 h-3 rounded-full bg-slate-300"></div>
                    <span id="status-text" class="font-medium text-slate-700">未ロード</span>
                </div>
                <button id="load-btn" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-xl transition-all text-sm font-bold">
                    AIを起動する
                </button>
            </div>
            
            <div id="progress-container" class="hidden mt-4">
                <div class="w-full bg-slate-100 rounded-full h-2 overflow-hidden">
                    <div id="progress-bar" class="bg-blue-500 h-full w-0 transition-all duration-300"></div>
                </div>
                <div id="log-text" class="text-[10px] text-slate-400 mt-2 font-mono h-4 overflow-hidden"></div>
            </div>
        </div>

        <!-- Chat Area -->
        <div class="bg-white border border-slate-200 rounded-2xl overflow-hidden shadow-sm flex flex-col">
            <div id="chat-history" class="chat-container overflow-y-auto p-5 space-y-4">
                <div class="flex justify-start">
                    <div class="bg-slate-100 rounded-2xl px-4 py-2 max-w-[85%] text-sm">
                        AIモデル（約200MB）をロードします。よろしいですか？
                    </div>
                </div>
            </div>

            <div class="p-4 border-t border-slate-50">
                <form id="chat-form" class="flex gap-2">
                    <input type="text" id="user-input" disabled placeholder="メッセージを入力..." 
                           class="flex-1 bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 disabled:opacity-50">
                    <button type="submit" id="send-btn" disabled class="bg-blue-600 text-white p-3 rounded-xl disabled:opacity-50">
                        送信
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script type="module">
        import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.0.0';

        // ブラウザ環境向けの最適化設定
        env.allowLocalModels = false;
        env.useBrowserCache = true;

        const loadBtn = document.getElementById('load-btn');
        const statusText = document.getElementById('status-text');
        const statusDot = document.getElementById('status-dot');
        const logText = document.getElementById('log-text');
        const progressBar = document.getElementById('progress-bar');
        const progressContainer = document.getElementById('progress-container');
        const chatHistory = document.getElementById('chat-history');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        let generator = null;

        function addMessage(role, text) {
            const wrapper = document.createElement('div');
            wrapper.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;
            const div = document.createElement('div');
            div.className = `${role === 'user' ? 'bg-blue-600 text-white' : 'bg-slate-100 text-slate-800'} rounded-2xl px-4 py-2 max-w-[85%] text-sm shadow-sm`;
            div.innerText = text;
            wrapper.appendChild(div);
            chatHistory.appendChild(wrapper);
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        loadBtn.addEventListener('click', async () => {
            loadBtn.disabled = true;
            statusText.innerText = "初期化中...";
            progressContainer.classList.remove('hidden');

            try {
                // モデルID
                const modelId = 'onnx-community/SmolLM2-135M-Instruct';
                
                // デバイスの判定
                const device = navigator.gpu ? 'webgpu' : 'cpu';
                logText.innerText = `Device: ${device} | Loading model...`;

                generator = await pipeline('text-generation', modelId, {
                    device: device,
                    dtype: 'q8', // 8ビット量子化版を指定してメモリ消費を抑える
                    progress_callback: (data) => {
                        if (data.status === 'progress') {
                            progressBar.style.width = `${data.progress}%`;
                            logText.innerText = `Downloading: ${Math.round(data.progress)}% (${data.file})`;
                        }
                        if (data.status === 'ready') {
                            logText.innerText = "Model ready!";
                        }
                    }
                });

                statusText.innerText = `稼働中 (${device})`;
                statusDot.className = "w-3 h-3 rounded-full bg-green-500";
                userInput.disabled = false;
                sendBtn.disabled = false;
                addMessage('ai', '準備ができました！何でも聞いてください。');

            } catch (err) {
                console.error("Critical Error:", err);
                statusText.innerText = "ロード失敗";
                statusDot.className = "w-3 h-3 rounded-full bg-red-500";
                
                let errorMsg = "エラーが発生しました。";
                if (window.location.protocol === 'file:') {
                    errorMsg += "HTMLファイルを直接ダブルクリックで開いているようです。ローカルサーバー経由で開いてください。";
                } else {
                    errorMsg += "ブラウザのセキュリティ制限、またはメモリ不足の可能性があります。";
                }
                addMessage('ai', errorMsg + "\n\n詳細: " + err.message);
            }
        });

        document.getElementById('chat-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = userInput.value.trim();
            if (!text || !generator) return;

            addMessage('user', text);
            userInput.value = '';
            userInput.disabled = true;

            try {
                const prompt = `<|im_start|>user\n${text}<|im_end|>\n<|im_start|>assistant\n`;
                const output = await generator(prompt, {
                    max_new_tokens: 100,
                    temperature: 0.7,
                    do_sample: true,
                    stop: ['<|im_end|>']
                });

                const fullText = output[0].generated_text;
                const response = fullText.split('assistant\n').pop().replace('<|im_end|>', '').trim();
                addMessage('ai', response || "...");
            } catch (err) {
                addMessage('ai', "生成エラー: " + err.message);
            } finally {
                userInput.disabled = false;
                userInput.focus();
            }
        });
    </script>
</body>
</html>
