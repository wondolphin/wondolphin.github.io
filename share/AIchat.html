<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local AI Chat - Debug Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .chat-container { height: calc(100vh - 350px); min-height: 350px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 leading-relaxed">

    <div class="max-w-4xl mx-auto px-4 py-6">
        <header class="mb-6 flex justify-between items-end border-b pb-4">
            <div>
                <h1 class="text-2xl font-bold text-slate-800">Local Browser AI</h1>
                <p id="current-url" class="text-[9px] text-slate-400 font-mono mt-1 break-all"></p>
            </div>
            <button id="clear-cache" class="text-[10px] text-slate-400 hover:text-red-500 transition-colors uppercase underline">キャッシュ消去</button>
        </header>

        <!-- Debug Info (Only shows if error occurs) -->
        <div id="debug-panel" class="hidden bg-red-50 border border-red-200 rounded-2xl p-4 mb-4 text-xs font-mono text-red-700 overflow-x-auto">
            <p class="font-bold mb-1 underline">デバッグ情報:</p>
            <div id="debug-content"></div>
        </div>

        <!-- Setup UI -->
        <div id="setup-card" class="bg-white border border-slate-200 rounded-3xl p-6 mb-6 shadow-sm">
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                <div class="flex-1">
                    <h2 class="font-bold text-slate-700">AIモデルのセットアップ</h2>
                    <p class="text-sm text-slate-500">
                        「SmolLM2-135M」をロードします（約200MB）。
                    </p>
                </div>
                <button id="load-btn" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-2xl transition-all font-bold shadow-lg shadow-blue-100 active:scale-95 disabled:opacity-50">
                    AIを起動
                </button>
            </div>
            
            <div id="progress-container" class="hidden mt-6 border-t border-slate-50 pt-4">
                <div class="flex justify-between mb-2 text-[10px] font-bold text-blue-600">
                    <span id="progress-file" class="text-slate-400 font-mono italic">Connecting...</span>
                    <span id="progress-percent">0%</span>
                </div>
                <div class="w-full bg-slate-100 rounded-full h-1.5 overflow-hidden">
                    <div id="progress-bar" class="bg-blue-500 h-full w-0 transition-all duration-500"></div>
                </div>
            </div>
        </div>

        <!-- Chat UI -->
        <div class="bg-white border border-slate-200 rounded-3xl overflow-hidden shadow-sm flex flex-col">
            <div id="chat-history" class="chat-container overflow-y-auto p-6 space-y-4 bg-slate-50/20">
                <div class="flex justify-start">
                    <div class="bg-white border border-slate-100 rounded-2xl px-5 py-3 max-w-[85%] text-sm shadow-sm">
                        GitHub Pagesで実行する場合、必ず <strong>.github.io</strong> で終わるURLでアクセスしてください。
                    </div>
                </div>
            </div>

            <div class="p-4 bg-white border-t border-slate-100">
                <form id="chat-form" class="flex gap-2">
                    <input type="text" id="user-input" disabled placeholder="メッセージを入力..." 
                           class="flex-1 bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 focus:outline-none focus:ring-2 focus:ring-blue-500 disabled:opacity-50 text-sm">
                    <button type="submit" id="send-btn" disabled class="bg-blue-600 text-white px-6 rounded-2xl disabled:opacity-50 font-bold hover:bg-blue-700 transition-all shadow-md">
                        送信
                    </button>
                </form>
            </div>
        </div>
        
        <footer class="mt-6 text-center">
            <p class="text-[10px] text-slate-300 uppercase tracking-widest">Device: <span id="runtime-info">...</span></p>
        </footer>
    </div>

    <script type="module">
        import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.0.0';

        // 表示用URL設定
        document.getElementById('current-url').innerText = "Current URL: " + window.location.href;

        // ライブラリ設定
        env.allowLocalModels = false;
        env.useBrowserCache = true;

        const loadBtn = document.getElementById('load-btn');
        const progressFile = document.getElementById('progress-file');
        const progressBar = document.getElementById('progress-bar');
        const progressPercent = document.getElementById('progress-percent');
        const progressContainer = document.getElementById('progress-container');
        const chatHistory = document.getElementById('chat-history');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const runtimeInfo = document.getElementById('runtime-info');
        const debugPanel = document.getElementById('debug-panel');
        const debugContent = document.getElementById('debug-content');

        function addMessage(role, text) {
            const wrapper = document.createElement('div');
            wrapper.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} fade-in`;
            const div = document.createElement('div');
            div.className = `${role === 'user' ? 'bg-blue-600 text-white shadow-blue-100' : 'bg-white border border-slate-200 text-slate-800 shadow-slate-100'} rounded-2xl px-5 py-3 max-w-[85%] text-sm shadow-sm whitespace-pre-wrap`;
            div.innerText = text;
            wrapper.appendChild(div);
            chatHistory.appendChild(wrapper);
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        function showDebug(msg) {
            debugPanel.classList.remove('hidden');
            debugContent.innerText += msg + "\n";
        }

        document.getElementById('clear-cache').addEventListener('click', async () => {
            if (confirm('キャッシュを消去しますか？')) {
                const dbs = await indexedDB.databases();
                dbs.forEach(db => indexedDB.deleteDatabase(db.name));
                alert('完了。リロードしてください。');
                window.location.reload();
            }
        });

        loadBtn.addEventListener('click', async () => {
            loadBtn.disabled = true;
            loadBtn.innerText = "ロード中...";
            progressContainer.classList.remove('hidden');
            debugContent.innerText = ""; // Clear previous debug info

            try {
                const modelId = 'onnx-community/SmolLM2-135M-Instruct';
                const device = navigator.gpu ? 'webgpu' : 'cpu';
                runtimeInfo.innerText = device.toUpperCase();

                showDebug(`Attempting to load model on ${device}...`);

                generator = await pipeline('text-generation', modelId, {
                    device: device,
                    progress_callback: (data) => {
                        if (data.status === 'progress') {
                            const p = Math.round(data.progress);
                            progressBar.style.width = `${p}%`;
                            progressPercent.innerText = `${p}%`;
                            progressFile.innerText = `Fetch: ${data.file.split('/').pop()}`;
                        }
                    }
                });

                userInput.disabled = false;
                sendBtn.disabled = false;
                document.getElementById('setup-card').classList.add('hidden');
                addMessage('ai', 'ロードに成功しました。チャットを開始できます！');

            } catch (err) {
                console.error("Pipeline Error:", err);
                const errorText = err?.message || String(err);
                showDebug(`Error detected: ${errorText}`);
                
                let friendlyMsg = "ロードに失敗しました。";
                
                // URLの不正判定
                if (window.location.hostname === 'raw.githubusercontent.com') {
                    friendlyMsg += "\n現在GitHubの「Raw表示」で開いています。これでは動作しません。GitHub Pagesの設定を完了させ、そちらのURLから開いてください。";
                } else if (errorText.includes('401') || errorText.includes('Unauthorized')) {
                    friendlyMsg += "\nサーバー(Hugging Face)へのアクセスが拒否されました。リポジトリが「Private（非公開）」になっていないか確認してください。Publicに変更する必要があります。";
                } else {
                    friendlyMsg += "\nネットワーク接続またはブラウザの制限を確認してください。";
                }
                
                addMessage('ai', friendlyMsg + "\n\n(Error Detail: " + errorText + ")");
                loadBtn.disabled = false;
                loadBtn.innerText = "再試行";
            }
        });

        document.getElementById('chat-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = userInput.value.trim();
            if (!text) return;

            addMessage('user', text);
            userInput.value = '';
            userInput.disabled = true;
            sendBtn.disabled = true;

            try {
                const prompt = `<|im_start|>user\n${text}<|im_end|>\n<|im_start|>assistant\n`;
                const output = await generator(prompt, {
                    max_new_tokens: 128,
                    temperature: 0.7,
                    do_sample: true,
                    stop: ['<|im_end|>', '<|im_start|>']
                });
                const response = output[0].generated_text.split('assistant\n').pop().replace('<|im_end|>', '').trim();
                addMessage('ai', response || "...");
            } catch (err) {
                addMessage('ai', "生成エラー: " + err.message);
            } finally {
                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.focus();
            }
        });
    </script>
</body>
</html>
