<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local AI Chat - Final Stability</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .chat-container { height: calc(100vh - 300px); min-height: 350px; }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <div class="max-w-4xl mx-auto px-4 py-6">
        <header class="mb-6 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold text-slate-800">Local Browser AI</h1>
                <p id="env-badge" class="text-[10px] text-slate-400 font-mono mt-1 uppercase tracking-widest">Environment: Checking...</p>
            </div>
            <div class="text-right">
                <span id="status-tag" class="text-xs font-bold px-3 py-1 rounded-full bg-slate-200 text-slate-500">OFFLINE</span>
            </div>
        </header>

        <!-- Setup UI -->
        <div id="setup-card" class="bg-white border border-slate-200 rounded-3xl p-6 mb-6 shadow-sm">
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                <div class="flex-1">
                    <h2 class="font-bold text-slate-700">AIモデルのロード</h2>
                    <p class="text-sm text-slate-500">超軽量モデル（約200MB）を使用します。GitHub Pagesでも動作しやすい設定です。</p>
                </div>
                <button id="load-btn" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-2xl transition-all font-bold shadow-lg active:scale-95 disabled:opacity-50">
                    開始する
                </button>
            </div>
            
            <div id="progress-container" class="hidden mt-6 border-t border-slate-50 pt-4">
                <div class="flex justify-between mb-2">
                    <span id="progress-file" class="text-[10px] text-slate-400 font-mono">準備中...</span>
                    <span id="progress-percent" class="text-[10px] font-bold text-blue-600">0%</span>
                </div>
                <div class="w-full bg-slate-100 rounded-full h-2 overflow-hidden">
                    <div id="progress-bar" class="bg-blue-500 h-full w-0 transition-all duration-300"></div>
                </div>
            </div>
        </div>

        <!-- Chat UI -->
        <div class="bg-white border border-slate-200 rounded-3xl overflow-hidden shadow-sm flex flex-col">
            <div id="chat-history" class="chat-container overflow-y-auto p-6 space-y-4 bg-slate-50/20">
                <div class="flex justify-start">
                    <div class="bg-white border border-slate-100 rounded-2xl px-5 py-3 max-w-[85%] text-sm shadow-sm leading-relaxed">
                        準備ができたら上のボタンを押してください。ブラウザ内のみで動作し、外部へ会話データが送信されることはありません。
                    </div>
                </div>
            </div>

            <div class="p-4 bg-white border-t border-slate-100">
                <form id="chat-form" class="flex gap-2">
                    <input type="text" id="user-input" disabled placeholder="メッセージを入力..." 
                           class="flex-1 bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 focus:outline-none focus:ring-2 focus:ring-blue-500 disabled:opacity-50 text-sm transition-all">
                    <button type="submit" id="send-btn" disabled class="bg-blue-600 text-white px-6 rounded-2xl disabled:opacity-50 font-bold hover:bg-blue-700 transition-all shadow-md">
                        送信
                    </button>
                </form>
            </div>
        </div>
        
        <footer class="mt-6 text-center">
            <p class="text-[10px] text-slate-400 uppercase tracking-tighter italic">Mode: <span id="runtime-info">Checking...</span></p>
        </footer>
    </div>

    <script type="module">
        import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.0.0';

        // 互換性設定
        env.allowLocalModels = false;
        env.useBrowserCache = true;
        env.remoteHost = 'https://huggingface.co/';
        env.remotePathTemplate = '{model}/resolve/{revision}/';

        const loadBtn = document.getElementById('load-btn');
        const statusTag = document.getElementById('status-tag');
        const envBadge = document.getElementById('env-badge');
        const progressFile = document.getElementById('progress-file');
        const progressBar = document.getElementById('progress-bar');
        const progressPercent = document.getElementById('progress-percent');
        const progressContainer = document.getElementById('progress-container');
        const chatHistory = document.getElementById('chat-history');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const runtimeInfo = document.getElementById('runtime-info');

        const isGitHub = window.location.hostname.includes('github.io');
        envBadge.innerText = isGitHub ? 'GitHub Pages' : 'Web/Local';
        
        let generator = null;

        function addMessage(role, text) {
            const wrapper = document.createElement('div');
            wrapper.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} fade-in`;
            const div = document.createElement('div');
            div.className = `${role === 'user' ? 'bg-blue-600 text-white shadow-blue-100' : 'bg-white border border-slate-200 text-slate-800 shadow-slate-100'} rounded-2xl px-5 py-3 max-w-[85%] text-sm shadow-md whitespace-pre-wrap leading-relaxed`;
            div.innerText = text;
            wrapper.appendChild(div);
            chatHistory.appendChild(wrapper);
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        loadBtn.addEventListener('click', async () => {
            loadBtn.disabled = true;
            statusTag.innerText = "LOADING";
            statusTag.classList.replace('bg-slate-200', 'bg-yellow-100');
            statusTag.classList.replace('text-slate-500', 'text-yellow-600');
            progressContainer.classList.remove('hidden');

            try {
                // 最も軽量でGitHub Pagesでも動きやすいモデル
                const modelId = 'onnx-community/SmolLM2-135M-Instruct';
                const device = navigator.gpu ? 'webgpu' : 'cpu';
                runtimeInfo.innerText = device.toUpperCase();

                generator = await pipeline('text-generation', modelId, {
                    device: device,
                    dtype: 'q4', // 4bit量子化版を強制的に使用（メモリ節約）
                    progress_callback: (data) => {
                        if (data.status === 'progress') {
                            const p = Math.round(data.progress);
                            progressBar.style.width = `${p}%`;
                            progressPercent.innerText = `${p}%`;
                            progressFile.innerText = `読み込み中: ${data.file.split('/').pop()}`;
                        }
                    }
                });

                statusTag.innerText = "ONLINE";
                statusTag.classList.replace('bg-yellow-100', 'bg-green-100');
                statusTag.classList.replace('text-yellow-600', 'text-green-600');
                
                userInput.disabled = false;
                sendBtn.disabled = false;
                document.getElementById('setup-card').classList.add('hidden');
                addMessage('ai', 'ロード完了！何でも聞いてください。');

            } catch (err) {
                console.error("Critical Load Error:", err);
                statusTag.innerText = "ERROR";
                statusTag.classList.replace('bg-yellow-100', 'bg-red-100');
                statusTag.classList.replace('text-yellow-600', 'text-red-600');
                
                // 安全なエラーメッセージの取得
                const errorMsg = err?.message || JSON.stringify(err) || "Unknown Error";
                
                let userFriendlyMsg = "エラーが発生しました。\n";
                if (errorMsg.includes('401')) {
                    userFriendlyMsg += "GitHubのRaw表示ではなく、GitHub PagesのURLからアクセスしてください。";
                } else if (errorMsg.includes('memory') || errorMsg.includes('allocation')) {
                    userFriendlyMsg += "ブラウザのメモリが不足しています。タブを減らして再試行してください。";
                } else {
                    userFriendlyMsg += "環境制限または一時的な通信エラーです。";
                }
                
                addMessage('ai', userFriendlyMsg + "\n\n(Error: " + errorMsg + ")");
                loadBtn.disabled = false;
            }
        });

        document.getElementById('chat-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = userInput.value.trim();
            if (!text || !generator) return;

            addMessage('user', text);
            userInput.value = '';
            userInput.disabled = true;
            sendBtn.disabled = true;

            try {
                const prompt = `<|im_start|>user\n${text}<|im_end|>\n<|im_start|>assistant\n`;
                const output = await generator(prompt, {
                    max_new_tokens: 128,
                    temperature: 0.7,
                    do_sample: true,
                    stop: ['<|im_end|>', '<|im_start|>']
                });

                const response = output[0].generated_text.split('assistant\n').pop().replace('<|im_end|>', '').trim();
                addMessage('ai', response || "...");
            } catch (err) {
                addMessage('ai', "生成エラー: " + (err?.message || "エラーが発生しました。"));
            } finally {
                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.focus();
            }
        });
    </script>
</body>
</html>
